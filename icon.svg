<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KGG App Icon</title>
  <desc id="desc">Official KGG logo with olive training figure, yellow motion arc and dumbbell.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="470" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffef8"/>
