<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KGG App Icon</title>
  <desc id="desc">Olive green KGG monogram with yellow spine curve and dumbbell accents.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="28" x2="442" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d6024"/>
      <stop offset="0.52" stop-color="#324414"/>
      <stop offset="1" stop-color="#20300d"/>
    </linearGradient>
    <linearGradient id="gold" x1="146" y1="95" x2="396" y2="393" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffea50"/>
      <stop offset="0.55" stop-color="#f3c522"/>
      <stop offset="1" stop-color="#d49b00"/>
    </linearGradient>
    <linearGradient id="cream" x1="120" y1="130" x2="250" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf0"/>
      <stop offset="1" stop-color="#efe9ca"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#101a07" flood-opacity="0.32"/>
    </filter>
    <filter id="letterShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#111806" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g opacity="0.16">
    <path d="M72 115c76-58 198-75 307-29" fill="none" stroke="#fff7c6" stroke-width="18" stroke-linecap="round"/>
    <path d="M86 404c91 49 230 50 337-7" fill="none" stroke="#111806" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M168 137c38 56 39 101 1 157-26 38-31 66-13 96" fill="none" stroke="url(#cream)" stroke-width="34" stroke-linecap="round"/>
    <path d="M178 136c42 63 40 108 1 166-21 31-27 56-15 82" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" opacity="0.96"/>
    <circle cx="184" cy="137" r="8" fill="#ffea50"/>
    <circle cx="181" cy="165" r="10" fill="#f6d33a"/>
    <circle cx="178" cy="198" r="11" fill="#f0c426"/>
    <circle cx="174" cy="232" r="10" fill="#e8b71d"/>
    <circle cx="169" cy="264" r="8" fill="#ffea50"/>
    <circle cx="164" cy="294" r="6" fill="#f3c522"/>
  </g>

  <g transform="translate(30 0)" filter="url(#letterShadow)">
    <text x="70" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="168" font-weight="900" letter-spacing="-7" fill="url(#cream)">K</text>
    <text x="207" y="316" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="168" font-weight="900" letter-spacing="-14" fill="url(#gold)">GG</text>
  </g>

  <g fill="url(#gold)" opacity="0.98" filter="url(#softShadow)">
    <rect x="47" y="231" width="14" height="49" rx="7"/>
    <rect x="70" y="212" width="20" height="88" rx="8"/>
    <rect x="96" y="201" width="22" height="110" rx="8"/>
    <rect x="124" y="229" width="12" height="54" rx="6"/>

    <rect x="451" y="231" width="14" height="49" rx="7"/>
    <rect x="422" y="212" width="20" height="88" rx="8"/>
    <rect x="394" y="201" width="22" height="110" rx="8"/>
    <rect x="376" y="229" width="12" height="54" rx="6"/>
  </g>

  <path d="M242 147c48-25 114-24 174 2" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" opacity="0.96"/>
  <path d="M219 363c53 22 122 14 171-18" fill="none" stroke="url(#gold)" stroke-width="15" stroke-linecap="round" opacity="0.92"/>
</svg>
