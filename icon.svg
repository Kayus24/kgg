<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KGG App Icon</title>
  <desc id="desc">Cream rounded KGG icon with olive training figure, yellow motion arc and dumbbell.</desc>
  <defs>
    <linearGradient id="cream" x1="78" y1="42" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf2"/>
      <stop offset="1" stop-color="#f1ecd8"/>
    </linearGradient>
    <linearGradient id="olive" x1="126" y1="112" x2="398" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b8732"/>
      <stop offset="0.55" stop-color="#596829"/>
      <stop offset="1" stop-color="#3f4f1c"/>
    </linearGradient>
    <linearGradient id="gold" x1="82" y1="114" x2="430" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffdc2e"/>
      <stop offset="0.58" stop-color="#f6c21b"/>
      <stop offset="1" stop-color="#e2a90e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#10200b" flood-opacity="0.18"/>
    </filter>
    <filter id="tiny" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#10200b" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="22" y="22" width="468" height="468" rx="82" fill="url(#cream)" filter="url(#soft)"/>

  <path d="M135 366C78 281 107 160 207 112c50-24 112-25 169-4" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" opacity="0.96"/>
  <path d="M165 402c80 42 190 35 259-29" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" opacity="0.95"/>

  <g filter="url(#tiny)">
    <circle cx="298" cy="139" r="32" fill="url(#olive)"/>
    <path d="M150 251c65-64 137-73 207-46 40 15 74 6 118-51-11 57-45 97-92 121-51 27-93 58-121 106-20 34-62 32-82 2 34-27 64-57 78-92 17-43 4-59-47-50-22 4-42 10-61 10z" fill="url(#olive)"/>
    <path d="M93 409c99-55 178-112 236-174 26-28 48-61 63-100 7 52-3 91-34 125-65 71-154 120-265 149z" fill="url(#olive)"/>
    <path d="M305 282c54-14 102 0 129 39 28 42 19 96-21 121 10-58-15-86-67-83-35 2-76 20-121 52 16-55 41-98 80-129z" fill="url(#olive)"/>
  </g>

  <g transform="rotate(38 400 95)" fill="url(#gold)" filter="url(#tiny)">
    <rect x="353" y="70" width="84" height="20" rx="8"/>
    <rect x="334" y="55" width="36" height="50" rx="9"/>
    <rect x="421" y="55" width="36" height="50" rx="9"/>
  </g>

  <text x="214" y="409" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="75" font-weight="900" letter-spacing="-8" fill="url(#olive)" opacity="0.96">KGG</text>
</svg>
