<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="KGG Plan"><title>KGG Plan</title><style>body{margin:0;background:#f4f7fb;color:#111827;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif}main{max-width:680px;margin:auto;padding:18px}.card{background:white;border:1px solid #dbe3ef;border-radius:18px;padding:16px;margin-top:16px;box-shadow:0 10px 28px #0f172a12}.btn{display:block;margin-top:12px;padding:14px;border-radius:14px;background:#111827;color:white;text-align:center;text-decoration:none;font-weight:900}.muted{color:#64748b}</style></head><body><main><div class="card"><h1>KGG Plan</h1><p id="msg" class="muted">Plan wird geöffnet…</p><div id="a"></div></div></main><script>const K='kggCurrentPlanV1';function q(){const p=new URLSearchParams(location.search);return p.get('plan')||p.get('kgg')||''}function d(s){s=String(s||'').replace(/^KGGH2:/,'').replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return new TextDecoder().decode(u)}function go(x){location.replace('./#KGGH2:'+x)}try{let x=q();if(x){let raw=JSON.parse(d(x));localStorage.setItem(K,JSON.stringify({plan:raw,importedAt:new Date().toISOString(),source:'ios-start'}));go(String(x).replace(/^KGGH2:/,''))}else{msg.textContent='Kein Plan im Startlink gefunden. Bitte QR-Code oder Planlink erneut öffnen.';a.innerHTML='<a class="btn" href="./">Zur App</a>'}}catch(e){msg.textContent='Plan konnte nicht gelesen werden. Bitte neuen QR-Code öffnen.';a.innerHTML='<a class="btn" href="./">Zur App</a>'}</script></body></html>
