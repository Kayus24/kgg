openapi: 3.1.0
info:
  title: KGG Blind Repair Lab Source
  version: "1.0.0"
  description: Read-only access to sanitized broken full-app challenges. Golden source, assertions and sample repairs are intentionally unavailable.
servers:
  - url: https://raw.githubusercontent.com
paths:
  /Kayus24/kgg/gpt-repair-lab/index.json:
    get:
      operationId: getKggRepairLabIndex
      summary: Get the current blind Repair-Lab round and opaque challenge ids.
      x-openai-isConsequential: false
      responses:
        "200":
          description: Sanitized challenge index.
  /Kayus24/kgg/gpt-repair-lab/challenges/{challenge_id}/challenge.json:
    get:
      operationId: getKggRepairChallenge
      summary: Get symptoms, expected visible behavior and payload contract for one challenge.
      x-openai-isConsequential: false
      parameters:
        - name: challenge_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^repair-[a-f0-9]{16}$"
      responses:
        "200":
          description: Sanitized challenge manifest.
  /Kayus24/kgg/gpt-repair-lab/challenges/{challenge_id}/source/index.json:
    get:
      operationId: getKggRepairSourceIndex
      summary: List exact chunks of the broken full Admin HTML.
      x-openai-isConsequential: false
      parameters:
        - name: challenge_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^repair-[a-f0-9]{16}$"
      responses:
        "200":
          description: Broken-source chunk index.
  /Kayus24/kgg/gpt-repair-lab/challenges/{challenge_id}/source/{chunk_file}:
    get:
      operationId: getKggRepairSourceChunk
      summary: Read one exact chunk of broken Admin HTML.
      x-openai-isConsequential: false
      parameters:
        - name: challenge_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^repair-[a-f0-9]{16}$"
        - name: chunk_file
          in: path
          required: true
          schema:
            type: string
            pattern: "^chunk-[0-9]{3}\\.txt$"
      responses:
        "200":
          description: Exact broken-source text chunk.
components:
  schemas: {}
