<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KGG HTML-Version oeffnen</title>
  <style>
    :root { color-scheme: light; --ink:#0a1024; --muted:#5d6878; --line:#dbe2ea; --soft:#f4f7fb; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #eef4fb;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 22px 60px rgba(10,16,36,.12);
    }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 6vw, 42px); line-height: 1.05; }
    p { margin: 0 0 18px; color: var(--muted); font-size: 18px; line-height: 1.35; }
    .status {
      margin: 18px 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--soft);
      font-weight: 750;
    }
    a.button {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--ink);
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-size: 20px;
      font-weight: 850;
    }
    .secondary { background: #fff !important; color: var(--ink) !important; border: 1px solid var(--line); }
    small { display:block; margin-top:16px; color:var(--muted); line-height:1.35; }
  </style>
</head>
<body>
  <main>
    <h1>KGG HTML-Version</h1>
    <p>Dieser Link fuehrt immer zur neuesten HTML-Version der Therapeut:innen-App.</p>
    <div id="status" class="status">Suche neueste Version...</div>
    <a id="openLatest" class="button" href="kgg_update_manifest.json">HTML-Version oeffnen</a>
    <a class="button secondary" href="latest-android.html">Android-App herunterladen</a>
    <small>Falls die Weiterleitung nicht automatisch startet, tippe auf den Button.</small>
  </main>
  <script>
    (async function(){
      const status = document.getElementById('status');
      const openLatest = document.getElementById('openLatest');
      try {
        const response = await fetch('kgg_update_manifest.json?ts=' + Date.now(), { cache: 'no-store' });
        const manifest = await response.json();
        const url = manifest.latestUrl || manifest.colleagueUrl || manifest.colleagueHtmlUrl;
        const version = manifest.latestVersion || manifest.latestColleagueVersion || 'neueste Version';
        if (!url) throw new Error('Keine HTML-URL im Manifest gefunden.');
        openLatest.href = url;
        status.textContent = 'Bereit: ' + version;
        window.setTimeout(function(){ window.location.href = url; }, 700);
      } catch (error) {
        status.textContent = 'Automatik nicht moeglich. Bitte den Button nutzen.';
      }
    })();
  </script>
</body>
</html>
