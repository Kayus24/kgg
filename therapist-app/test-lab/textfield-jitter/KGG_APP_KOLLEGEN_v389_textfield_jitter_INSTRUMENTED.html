},layout:{text:tr,planList:pr,currentPlan:cr,suggestion:sr,bottom:br,anchorTop:anchor,lastJumpPx:lastJump,maxJumpPx:maxJump},visualViewport:viewport?{width:Math.round(viewport.width),height:Math.round(viewport.height),offsetTop:Math.round(viewport.offsetTop),offsetLeft:Math.round(viewport.offsetLeft),pageTop:Math.round(viewport.pageTop),scale:viewport.scale}:null,window:{innerWidth:win.innerWidth,innerHeight:win.innerHeight,scrollX:win.scrollX,scrollY:win.scrollY},samples,jumps,verdict:maxJump>=12?'layout_jump_detected':'no_large_jump_yet'};const lines=[];lines.push('App: '+appTitle);lines.push('loadedApp: '+loadedAppPath);lines.push('focusActive: '+focusActive+' | inputEvents: '+inputEvents+' | requestAnimationFrame calls: '+renderEvents);lines.push('last input tail: '+(lastInput||'-'));lines.push(shortRect('TEXT',tr));lines.push(shortRect('PLANLIST',pr));lines.push(shortRect('CURRENT',cr));lines.push(shortRect('SUGGEST',sr));lines.push(shortRect('BOTTOM',br));lines.push('visualViewport: h '+(viewport?Math.round(viewport.height):'n/a')+' offsetTop '+(viewport?Math.round(viewport.offsetTop):'n/a')+' pageTop '+(viewport?Math.round(viewport.pageTop):'n/a'));lines.push('last jump: '+jump+' px | max jump: '+maxJump+' px');lines.push('JSON: Button oben nutzen -> anzeigen/kopieren. Verdict: '+lastDiag.verdict);lines.push('samples: '+samples.slice(-12).map(s=>'#'+s.tick+':j'+s.jump+'/a'+s.anchor+'/i'+s.inputEvents+'/r'+s.renderEvents+'/vh'+s.vh+'/vo'+s.vo).join('  '));if(maxJump>=12)lines.push('WARN: messbarer Layout-Sprung >= 12px');else lines.push('OK: bisher kein grosser Sprung gemessen');const log=lines.join('\n');if(log!==lastLog&&!hidden){out.textContent=log;lastLog=log}if(jsonVisible)updateJsonBox()}
