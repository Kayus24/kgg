<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KGG Test B Swipe</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.top{position:fixed;left:0;right:0;top:0;z-index:10;background:#071027;color:white;padding:8px;font-weight:900;font-size:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.top button{border:0;border-radius:999px;background:white;color:#071027;padding:6px 10px;font-weight:1000}.top button.active{background:#fff1a8}.frame{position:absolute;left:0;right:0;top:72px;bottom:0}.frame iframe{width:100%;height:100%;border:0;background:#e8eef6}.log{position:fixed;left:8px;right:8px;bottom:8px;z-index:20;max-height:34vh;overflow:auto;background:rgba(7,16,39,.92);color:white;border-radius:16px;padding:10px;font:12px ui-monospace,monospace;white-space:pre-wrap}.json{display:none;position:fixed;left:8px;right:8px;bottom:8px;height:42vh;z-index:30;background:white;border:2px solid #111827;border-radius:16px;overflow:hidden}.json textarea{width:100%;height:100%;border:0;padding:10px;font:12px ui-monospace,monospace}@media(max-width:720px){.log{font-size:11px;max-height:30vh}.top{font-size:11px}.frame{top:86px}}
</style>
</head>
<body>
<div class="top"><b>TEST B · Swipe</b><span>v389 Frame</span><button id="nativeBtn">Native v389</button><button id="overrideBtn" class="active">Override-Swipe</button><button id="jsonBtn">JSON</button><button id="copyBtn">Kopieren</button></div>
<div class="frame"><iframe id="f" src="/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=swipeb1"></iframe></div>
<pre class="log" id="log">Lade echte v389…</pre>
<div class="json" id="jsonBox"><textarea id="jsonOut" readonly>{}</textarea></div>
<script>
(function(){
const f=document.getElementById('f'),logEl=document.getElementById('log'),jsonBox=document.getElementById('jsonBox'),jsonOut=document.getElementById('jsonOut'),nativeBtn=document.getElementById('nativeBtn'),overrideBtn=document.getElementById('overrideBtn');
let mode='override',jsonVisible=false;
let data={kind:'kgg-swipe-animation-test-b',version:1,loadedApp:'/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=swipeb1',mode,appTitle:'',events:{pointerDown:0,overrideActive:0,nativePass:0,move:0,armed:0,finish:0,cancel:0},last:{dx:0,computedTransform:'',inlineTransform:'',className:''},cardsFound:0,verdict:'loading'};
function qsa(doc,s){try{return Array.from(doc.querySelectorAll(s))}catch(e){return[]}}
function cardFrom(el){return el&&el.closest&&el.closest('.planCard,[data-plan-id]')}
function update(){data.updatedAt=new Date().toISOString();data.mode=mode;jsonOut.value=JSON.stringify(data,null,2);logEl.textContent='Mode: '+mode+'\nApp: '+(data.appTitle||'-')+'\nCards: '+data.cardsFound+'\npointerDown '+data.events.pointerDown+' | nativePass '+data.events.nativePass+' | overrideActive '+data.events.overrideActive+'\nmove '+data.events.move+' | armed '+data.events.armed+' | finish '+data.events.finish+' | cancel '+data.events.cancel+'\nlast dx '+data.last.dx+'\ninline transform: '+(data.last.inlineTransform||'-')+'\ncomputed transform: '+(data.last.computedTransform||'-')+'\nclasses: '+(data.last.className||'-')+'\nverdict: '+data.verdict+'\n\nTest: Erst Override-Swipe benutzen. Karte muss sichtbar horizontal mitgehen. Dann Native v389 vergleichen.'}
function setMode(m){mode=m;nativeBtn.classList.toggle('active',m==='native');overrideBtn.classList.toggle('active',m==='override');update()}
nativeBtn.onclick=()=>setMode('native');overrideBtn.onclick=()=>setMode('override');document.getElementById('jsonBtn').onclick=()=>{jsonVisible=!jsonVisible;jsonBox.style.display=jsonVisible?'block':'none';update()};document.getElementById('copyBtn').onclick=async()=>{update();jsonOut.focus();jsonOut.select();try{await navigator.clipboard.writeText(jsonOut.value)}catch(e){document.execCommand('copy')}};
function install(){const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc||win.__kggSwipeB)return;win.__kggSwipeB=true;data.appTitle=doc.title||'';data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;doc.addEventListener('pointerdown',ev=>{const c=cardFrom(ev.target);if(!c||ev.target.closest('button,input,textarea,select,a'))return;data.events.pointerDown++;if(mode==='native'){data.events.nativePass++;update();return}ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();startSwipe(doc,ev,c);update()},true);update()}
function startSwipe(doc,ev,c){data.events.overrideActive++;const sx=ev.clientX,sy=ev.clientY;let active=false,dx=0;function clean(){doc.removeEventListener('pointermove',move,true);doc.removeEventListener('pointerup',up,true);doc.removeEventListener('pointercancel',cancel,true)}function snapshot(){data.last.dx=Math.round(dx);data.last.inlineTransform=c.style.transform||'';try{data.last.computedTransform=getComputedStyle(c).transform||''}catch(e){}data.last.className=c.className||''}function move(e){dx=e.clientX-sx;const dy=e.clientY-sy;if(!active){if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)*1.2){data.events.cancel++;clean();reset();update();return}if(Math.abs(dx)<8||Math.abs(dx)<Math.abs(dy)*1.15)return;active=true;c.classList.add('swipe-dragging');try{c.setPointerCapture&&c.setPointerCapture(ev.pointerId)}catch(err){}}
if(!active)return;e.preventDefault();e.stopPropagation();const max=c.offsetWidth*.86;dx=Math.max(-max,Math.min(max,dx));const strength=Math.min(1,Math.abs(dx)/Math.max(70,c.offsetWidth*.28));c.classList.toggle('swipe-left',dx<0);c.classList.toggle('swipe-right',dx>0);c.classList.toggle('swipe-armed',strength>=1);if(strength>=1)data.events.armed++;c.style.setProperty('--swipe-strength',String(strength));c.style.setProperty('--kgg-plan-swipe-x',dx+'px');c.style.transform='translate3d('+dx+'px,0,0)';c.style.opacity=String(1-strength*.16);data.events.move++;snapshot();data.verdict=Math.abs(dx)>20?'override_translation_applied':'override_waiting';update()}function reset(){c.classList.remove('swipe-dragging','swipe-armed','swipe-left','swipe-right','swipe-removing');c.style.removeProperty('transform');c.style.removeProperty('opacity');c.style.removeProperty('transition');c.style.removeProperty('--swipe-strength');c.style.removeProperty('--kgg-plan-swipe-x');snapshot()}function up(e){clean();if(active){e.preventDefault();e.stopPropagation();data.events.finish++;c.style.transition='transform .22s cubic-bezier(.2,.9,.2,1), opacity .18s ease';c.style.transform='translate3d(0,0,0)';c.style.opacity='1';setTimeout(()=>{reset();update()},230)}else{reset()}snapshot();update()}function cancel(){data.events.cancel++;clean();reset();update()}doc.addEventListener('pointermove',move,true);doc.addEventListener('pointerup',up,true,{once:true});doc.addEventListener('pointercancel',cancel,true,{once:true})}
function measure(){try{const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc)return;install();data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;if(data.events.move>0&&data.last.computedTransform&&data.last.computedTransform!=='none')data.verdict='transform_visible_in_dom';else if(mode==='native')data.verdict='native_mode';update()}catch(e){data.verdict='error';data.error=String(e&&e.message||e);update()}}
f.addEventListener('load',()=>setTimeout(measure,800));setInterval(measure,1000);update();
})();
</script>
</body>
</html>
