<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KGG Test 003 CardLogic360</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.top{position:fixed;left:0;right:0;top:0;z-index:10;background:#071027;color:white;padding:8px;font-weight:900;font-size:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.top button{border:0;border-radius:999px;background:white;color:#071027;padding:6px 10px;font-weight:1000}.frame{position:absolute;left:0;right:0;top:58px;bottom:0}.frame iframe{width:100%;height:100%;border:0;background:#e8eef6}.log{position:fixed;left:8px;right:8px;bottom:8px;z-index:20;max-height:34vh;overflow:auto;background:rgba(7,16,39,.92);color:white;border-radius:16px;padding:10px;font:12px ui-monospace,monospace;white-space:pre-wrap}.json{display:none;position:fixed;left:8px;right:8px;bottom:8px;height:42vh;z-index:30;background:white;border:2px solid #111827;border-radius:16px;overflow:hidden}.json textarea{width:100%;height:100%;border:0;padding:10px;font:12px ui-monospace,monospace}@media(max-width:720px){.frame{top:72px}.log{font-size:11px;max-height:30vh}}
</style>
</head>
<body>
<div class="top"><b>TEST 003 · CardLogic360</b><span>lowercase stable link</span><button id="jsonBtn">JSON</button><button id="copyBtn">Kopieren</button></div>
<div class="frame"><iframe id="f" src="/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=test003"></iframe></div>
<pre class="log" id="log">Lade echte v389…</pre>
<div class="json" id="jsonBox"><textarea id="jsonOut" readonly>{}</textarea></div>
<script>
(function(){
const f=document.getElementById('f'),logEl=document.getElementById('log'),jsonBox=document.getElementById('jsonBox'),jsonOut=document.getElementById('jsonOut');
let data={kind:'kgg-cardlogic360-test003',version:1,loadedApp:'/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=test003',events:{pointerDown:0,blockedV389:0,holdActivated:0,cancelBeforeHold:0,finish:0},cardsFound:0,scroll:{lastY:null,maxJump:0,samples:[]},verdict:'loading'};
let jsonVisible=false,lastY=null;
function qsa(doc,s){try{return Array.from(doc.querySelectorAll(s))}catch(e){return[]}}
function nearHandle(el){return el&&el.closest&&el.closest('.drag[data-sort-id],[data-sort-id],.dragHandle,.sortHandle,.planDrag')}
function nearCard(el){return el&&el.closest&&el.closest('.planCard,[data-plan-id]')}
function update(){data.updatedAt=new Date().toISOString();jsonOut.value=JSON.stringify(data,null,2);logEl.textContent='App: '+(data.appTitle||'-')+'\nCards: '+data.cardsFound+'\npointerDown '+data.events.pointerDown+' | blocked '+data.events.blockedV389+'\nholdActivated '+data.events.holdActivated+' | cancelBeforeHold '+data.events.cancelBeforeHold+' | finish '+data.events.finish+'\nscroll maxJump '+data.scroll.maxJump+'\nverdict '+data.verdict+'\n\nHalten am Drag-Handle testen. Normales Scrollen soll cancelBeforeHold erhöhen, bewusstes Halten holdActivated.'}
document.getElementById('jsonBtn').onclick=()=>{jsonVisible=!jsonVisible;jsonBox.style.display=jsonVisible?'block':'none';update()};
document.getElementById('copyBtn').onclick=async()=>{update();jsonOut.focus();jsonOut.select();try{await navigator.clipboard.writeText(jsonOut.value)}catch(e){document.execCommand('copy')}};
function install(){const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc||win.__kggTest003)return;win.__kggTest003=true;data.appTitle=doc.title||'';data.verdict='installed';data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;doc.addEventListener('pointerdown',ev=>{const h=nearHandle(ev.target);if(!h)return;const c=nearCard(h);if(!c)return;data.events.pointerDown++;data.events.blockedV389++;ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();startHold(doc,ev,h,c);update()},true);update()}
function startHold(doc,ev,h,c){let active=false,cancelled=false;const sx=ev.clientX,sy=ev.clientY;const timer=setTimeout(()=>activate(),120);h.style.background='#dcecff';function clean(){clearTimeout(timer);doc.removeEventListener('pointermove',pre,true);doc.removeEventListener('pointermove',move,true);doc.removeEventListener('pointerup',up,true);h.style.background=''}function pre(e){const dx=Math.abs(e.clientX-sx),dy=Math.abs(e.clientY-sy);if(!active&&(dx>12||dy>12)){cancelled=true;data.events.cancelBeforeHold++;clean();update()}}function activate(){if(cancelled||active)return;active=true;data.events.holdActivated++;c.style.transform='scale(1.035)';c.style.boxShadow='0 18px 40px rgba(7,16,39,.28)';doc.removeEventListener('pointermove',pre,true);doc.addEventListener('pointermove',move,true);update()}function move(e){if(!active)return;e.preventDefault();e.stopPropagation();c.style.transform='translateY('+(e.clientY-sy)+'px) scale(1.035)'}function up(e){if(active){data.events.finish++;c.style.transform='';c.style.boxShadow='';e.preventDefault();e.stopPropagation()}clean();update()}doc.addEventListener('pointermove',pre,true);doc.addEventListener('pointerup',up,true,{once:true})}
function measure(){try{const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc)return;install();const y=Math.round(win.scrollY||0);if(lastY!=null){const j=Math.abs(y-lastY);if(j>data.scroll.maxJump)data.scroll.maxJump=j;if(j>0){data.scroll.samples.push({t:Date.now(),y,j});if(data.scroll.samples.length>20)data.scroll.samples.shift()}}lastY=y;data.scroll.lastY=y;data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;if(data.events.holdActivated>0)data.verdict='override_active';update()}catch(e){data.verdict='error';data.error=String(e&&e.message||e);update()}}
f.addEventListener('load',()=>setTimeout(measure,800));setInterval(measure,700);update();
})();
</script>
</body>
</html>
