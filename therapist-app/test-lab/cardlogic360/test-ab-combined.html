<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KGG Test AB Combined</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.top{position:fixed;left:0;right:0;top:0;z-index:10;background:#071027;color:white;padding:8px;font-weight:900;font-size:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.top button{border:0;border-radius:999px;background:white;color:#071027;padding:6px 10px;font-weight:1000}.frame{position:absolute;left:0;right:0;top:72px;bottom:0}.frame iframe{width:100%;height:100%;border:0;background:#e8eef6}.log{position:fixed;left:8px;right:8px;bottom:8px;z-index:20;max-height:34vh;overflow:auto;background:rgba(7,16,39,.92);color:white;border-radius:16px;padding:10px;font:12px ui-monospace,monospace;white-space:pre-wrap}.json{display:none;position:fixed;left:8px;right:8px;bottom:8px;height:42vh;z-index:30;background:white;border:2px solid #111827;border-radius:16px;overflow:hidden}.json textarea{width:100%;height:100%;border:0;padding:10px;font:12px ui-monospace,monospace}@media(max-width:720px){.log{font-size:11px;max-height:30vh}.top{font-size:11px}.frame{top:86px}}
</style>
</head>
<body>
<div class="top"><b>TEST AB · Drag + Swipe</b><span>v389 Frame · keine DB-Fixes</span><button id="jsonBtn">JSON</button><button id="copyBtn">Kopieren</button></div>
<div class="frame"><iframe id="f" src="/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=ab1"></iframe></div>
<pre class="log" id="log">Lade echte v389…</pre>
<div class="json" id="jsonBox"><textarea id="jsonOut" readonly>{}</textarea></div>
<script>
(function(){
const f=document.getElementById('f'),logEl=document.getElementById('log'),jsonBox=document.getElementById('jsonBox'),jsonOut=document.getElementById('jsonOut');
let jsonVisible=false,lastY=null;
let data={kind:'kgg-cardlogic360-ab-combined',version:1,loadedApp:'/kgg/therapist-app/releases/v389/web/KGG_APP_KOLLEGEN_v389_flow_stability.html?v=ab1',appTitle:'',events:{dragPointer:0,dragHold:0,dragCancel:0,dragFinish:0,swipePointer:0,swipeMove:0,swipeArmed:0,swipeFinish:0,swipeCancel:0},last:{gesture:'',dx:0,dy:0,computedTransform:'',inlineTransform:'',className:''},cardsFound:0,scroll:{lastY:null,maxJump:0,samples:[]},verdict:'loading'};
function qsa(doc,s){try{return Array.from(doc.querySelectorAll(s))}catch(e){return[]}}
function cardFrom(el){return el&&el.closest&&el.closest('.planCard,[data-plan-id]')}
function handleFrom(el){return el&&el.closest&&el.closest('.drag[data-sort-id],[data-sort-id],.dragHandle,.sortHandle,.planDrag')}
function interactive(el){return el&&el.closest&&el.closest('button,input,textarea,select,a')}
function update(){data.updatedAt=new Date().toISOString();jsonOut.value=JSON.stringify(data,null,2);logEl.textContent='App: '+(data.appTitle||'-')+'\nCards: '+data.cardsFound+'\nDRAG pointer '+data.events.dragPointer+' | hold '+data.events.dragHold+' | cancel '+data.events.dragCancel+' | finish '+data.events.dragFinish+'\nSWIPE pointer '+data.events.swipePointer+' | move '+data.events.swipeMove+' | armed '+data.events.swipeArmed+' | finish '+data.events.swipeFinish+' | cancel '+data.events.swipeCancel+'\nlast gesture '+(data.last.gesture||'-')+' dx '+data.last.dx+' dy '+data.last.dy+'\ninline transform '+(data.last.inlineTransform||'-')+'\ncomputed '+(data.last.computedTransform||'-')+'\nscroll maxJump '+data.scroll.maxJump+'\nverdict '+data.verdict+'\n\nTest: 1) Drag-Handle kurz halten und hoch/runter ziehen. 2) Karte links/rechts swipen. 3) DB-Vorschlag-Jitter ignorieren, wird spaeter separat getestet.'}
document.getElementById('jsonBtn').onclick=()=>{jsonVisible=!jsonVisible;jsonBox.style.display=jsonVisible?'block':'none';update()};document.getElementById('copyBtn').onclick=async()=>{update();jsonOut.focus();jsonOut.select();try{await navigator.clipboard.writeText(jsonOut.value)}catch(e){document.execCommand('copy')}};
function snap(c,gesture,dx,dy){data.last.gesture=gesture;data.last.dx=Math.round(dx||0);data.last.dy=Math.round(dy||0);data.last.inlineTransform=c.style.transform||'';try{data.last.computedTransform=getComputedStyle(c).transform||''}catch(e){}data.last.className=c.className||'';}
function install(){const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc||win.__kggABCombined)return;win.__kggABCombined=true;data.appTitle=doc.title||'';data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;doc.addEventListener('pointerdown',ev=>{const h=handleFrom(ev.target);if(h){const c=cardFrom(h);if(c){ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();startDrag(doc,ev,h,c);return}}const c=cardFrom(ev.target);if(!c||interactive(ev.target))return;ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();startSwipe(doc,ev,c);},true);update()}
function startDrag(doc,ev,h,c){data.events.dragPointer++;const sx=ev.clientX,sy=ev.clientY;let active=false,cancelled=false,ph=null;h.style.background='#dcecff';const timer=setTimeout(activate,120);function clean(){clearTimeout(timer);doc.removeEventListener('pointermove',pre,true);doc.removeEventListener('pointermove',move,true);doc.removeEventListener('pointerup',up,true);doc.removeEventListener('pointercancel',cancel,true);h.style.background=''}function pre(e){const dx=Math.abs(e.clientX-sx),dy=Math.abs(e.clientY-sy);if(!active&&(dx>12||dy>12)){cancelled=true;data.events.dragCancel++;clean();update()}}function activate(){if(cancelled||active)return;active=true;data.events.dragHold++;const r=c.getBoundingClientRect();ph=doc.createElement('div');ph.style.height=Math.max(48,r.height)+'px';ph.style.borderRadius='16px';ph.style.background='rgba(7,16,39,.08)';c.after(ph);c.style.position='fixed';c.style.zIndex='99999';c.style.left=r.left+'px';c.style.top=r.top+'px';c.style.width=r.width+'px';c.style.transform='translate3d(0,0,0) scale(1.035)';c.style.boxShadow='0 22px 42px rgba(7,16,39,.22)';c.style.pointerEvents='none';doc.removeEventListener('pointermove',pre,true);doc.addEventListener('pointermove',move,true);snap(c,'drag-hold',0,0);data.verdict='drag_hold_active';update()}function move(e){if(!active)return;e.preventDefault();e.stopPropagation();const dy=e.clientY-sy;c.style.transform='translate3d(0,'+dy+'px,0) scale(1.035)';snap(c,'drag-move',0,dy);update()}function up(e){if(active){e.preventDefault();e.stopPropagation();data.events.dragFinish++;if(ph)ph.remove();c.style.position='';c.style.zIndex='';c.style.left='';c.style.top='';c.style.width='';c.style.transform='';c.style.boxShadow='';c.style.pointerEvents='';snap(c,'drag-finish',0,0)}clean();update()}function cancel(){data.events.dragCancel++;if(ph)ph.remove();c.style.transform='';c.style.boxShadow='';clean();update()}doc.addEventListener('pointermove',pre,true);doc.addEventListener('pointerup',up,true,{once:true});doc.addEventListener('pointercancel',cancel,true,{once:true});update()}
function startSwipe(doc,ev,c){data.events.swipePointer++;const sx=ev.clientX,sy=ev.clientY;let active=false,dx=0;function clean(){doc.removeEventListener('pointermove',move,true);doc.removeEventListener('pointerup',up,true);doc.removeEventListener('pointercancel',cancel,true)}function reset(){c.classList.remove('swipe-dragging','swipe-armed','swipe-left','swipe-right','swipe-removing');c.style.removeProperty('transform');c.style.removeProperty('opacity');c.style.removeProperty('transition');c.style.removeProperty('--swipe-strength');c.style.removeProperty('--kgg-plan-swipe-x')}function move(e){dx=e.clientX-sx;const dy=e.clientY-sy;if(!active){if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)*1.2){data.events.swipeCancel++;clean();reset();update();return}if(Math.abs(dx)<8||Math.abs(dx)<Math.abs(dy)*1.15)return;active=true;c.classList.add('swipe-dragging')}if(!active)return;e.preventDefault();e.stopPropagation();const max=c.offsetWidth*.86;dx=Math.max(-max,Math.min(max,dx));const strength=Math.min(1,Math.abs(dx)/Math.max(70,c.offsetWidth*.28));c.classList.toggle('swipe-left',dx<0);c.classList.toggle('swipe-right',dx>0);c.classList.toggle('swipe-armed',strength>=1);if(strength>=1)data.events.swipeArmed++;c.style.setProperty('--swipe-strength',String(strength));c.style.setProperty('--kgg-plan-swipe-x',dx+'px');c.style.transform='translate3d('+dx+'px,0,0)';c.style.opacity=String(1-strength*.16);data.events.swipeMove++;snap(c,'swipe-move',dx,0);data.verdict='swipe_translation_active';update()}function up(e){clean();if(active){e.preventDefault();e.stopPropagation();data.events.swipeFinish++;c.style.transition='transform .22s cubic-bezier(.2,.9,.2,1), opacity .18s ease';c.style.transform='translate3d(0,0,0)';c.style.opacity='1';setTimeout(()=>{reset();update()},230)}else reset();snap(c,'swipe-finish',dx,0);update()}function cancel(){data.events.swipeCancel++;clean();reset();update()}doc.addEventListener('pointermove',move,true);doc.addEventListener('pointerup',up,true,{once:true});doc.addEventListener('pointercancel',cancel,true,{once:true});update()}
function measure(){try{const win=f.contentWindow,doc=f.contentDocument;if(!win||!doc)return;install();data.cardsFound=qsa(doc,'.planCard,[data-plan-id]').length;const y=Math.round(win.scrollY||0);if(lastY!=null){const j=Math.abs(y-lastY);if(j>data.scroll.maxJump)data.scroll.maxJump=j;if(j>0){data.scroll.samples.push({t:Date.now(),y,j});if(data.scroll.samples.length>20)data.scroll.samples.shift()}}lastY=y;data.scroll.lastY=y;if(data.events.dragHold>0&&data.events.swipeMove>0)data.verdict='drag_and_swipe_active';update()}catch(e){data.verdict='error';data.error=String(e&&e.message||e);update()}}
f.addEventListener('load',()=>setTimeout(measure,800));setInterval(measure,1000);update();
})();
</script>
</body>
</html>
