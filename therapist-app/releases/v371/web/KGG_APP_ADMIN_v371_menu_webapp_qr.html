<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>KGG Admin v371 Menue</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#e8eef6;color:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.boot{background:#fff;border:1px solid #dce3eb;border-radius:22px;padding:18px 20px;box-shadow:0 10px 28px #0710271a;font-weight:900}</style>
</head>
<body><div class="boot">KGG Admin v371 wird geladen…</div>
<script>
(async function(){
  const SOURCE='https://kayus24.github.io/kgg/therapist-app/releases/v366/web/KGG_APP_ADMIN_v366_mobile_floating_history_packages.html';
  const COLLEAGUE_URL='https://kayus24.github.io/kgg/therapist-app/releases/v371/web/KGG_APP_KOLLEGEN_v371_menu_webapp.html';
  const MANIFEST_URL='https://kayus24.github.io/kgg/therapist-app/releases/v371/web/kgg_therapist_manifest.webmanifest';
  const CSS='<style id="kggV371SafeMenuCss">.adminTestBanner{display:none!important}.scanHub .adminConfigBtn,.scanHub .sharedBankBtn,.scanHub .syncQrBtn{display:none!important}.kggV371MenuBtn{width:100%;min-height:52px;border:1px solid rgba(10,16,36,.12);border-radius:17px;background:#fff;color:#071027;font-weight:1000;text-align:left;padding:0 13px;box-shadow:0 4px 12px rgba(7,16,39,.06)}.kggV371MenuBtn.primaryLite{background:#edf5ff;color:#073254;border-color:#9cccf4}.kggV371PhoneMenuFab{position:fixed;left:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:1120;width:52px;height:52px;border:1px solid rgba(10,16,36,.15);border-radius:18px;background:#fff;box-shadow:0 18px 42px rgba(7,16,39,.22);font-size:25px;font-weight:1000;color:#071027;display:none}.kggV371PhoneSheet{position:fixed;left:14px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:1115;width:min(330px,calc(100vw - 28px));display:none;grid-template-columns:1fr;gap:8px;background:rgba(255,255,255,.97);border:1px solid rgba(10,16,36,.12);border-radius:22px;padding:12px;box-shadow:0 18px 46px rgba(7,16,39,.24);backdrop-filter:blur(12px);transform-origin:left bottom;animation:kggV371PhoneUp .2s cubic-bezier(.2,.85,.2,1) both}body.kggV371PhoneMenuOpen .kggV371PhoneSheet{display:grid}@keyframes kggV371PhoneUp{0%{opacity:0;transform:translateY(12px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}@media(max-width:759px){.kggV371PhoneMenuFab{display:grid;place-items:center}.tabletMenuBtn{display:none!important}}.kggV371QrModal{position:fixed;inset:0;z-index:1200;background:rgba(7,16,39,.42);display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px)}.kggV371QrModal.open{display:flex}.kggV371QrSheet{width:min(94vw,520px);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;padding:16px;box-shadow:0 22px 70px rgba(7,16,39,.28)}.kggV371QrBox{display:grid;place-items:center;min-height:280px;background:#fff;border:1px solid #dce3eb;border-radius:18px;padding:12px}.kggV371QrBox svg{width:100%;max-width:390px;height:auto}.kggV371QrText{width:100%;min-height:74px;margin-top:10px;border:1px solid #dce3eb;border-radius:14px;padding:10px;font-size:12px;word-break:break-all}.kggV371QrActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}</style>';
  const JS='<script id="kggV371SafeMenuJs">(function(){const COLLEAGUE_URL='+JSON.stringify(COLLEAGUE_URL)+';const $=id=>document.getElementById(id);function makeQr(raw){const qr=qrcode(0,"M");qr.addData(raw);qr.make();return qr.createSvgTag({cellSize:6,margin:4,scalable:true});}function ensureQrModal(){let m=$("kggV371QrModal");if(m)return m;m=document.createElement("div");m.id="kggV371QrModal";m.className="kggV371QrModal";m.innerHTML="<div class=\"kggV371QrSheet\"><h2 id=\"kggV371QrTitle\">QR</h2><p class=\"notice\" id=\"kggV371QrHint\"></p><div class=\"kggV371QrBox\" id=\"kggV371QrBox\"></div><textarea class=\"kggV371QrText\" id=\"kggV371QrText\" readonly></textarea><div class=\"kggV371QrActions\"><button class=\"mutedBtn\" id=\"kggV371QrCopy\" type=\"button\">Link kopieren</button><button class=\"primary\" id=\"kggV371QrClose\" type=\"button\">Schließen</button></div></div>";document.body.appendChild(m);$("kggV371QrClose").onclick=()=>m.classList.remove("open");m.onclick=e=>{if(e.target===m)m.classList.remove("open")};return m;}async function showQr(title,raw,hint){const m=ensureQrModal();$("kggV371QrTitle").textContent=title;$("kggV371QrHint").textContent=hint||"";$("kggV371QrBox").innerHTML=makeQr(raw);$("kggV371QrText").value=raw;$("kggV371QrCopy").onclick=async()=>{try{await navigator.clipboard.writeText(raw)}catch(e){$("kggV371QrText").focus();$("kggV371QrText").select()}};m.classList.add("open");}function clickId(id){const el=$(id);if(el){el.click();return true}return false;}function createBtn(text,fn,cls){const btn=document.createElement("button");btn.type="button";btn.className="kggV371MenuBtn "+(cls||"");btn.textContent=text;btn.onclick=fn;return btn;}function showColleagueQr(){showQr("Kolleg:innen-Web-App öffnen",COLLEAGUE_URL,"QR öffnet die Nicht-Admin-Web-App. In Chrome kann sie danach über Browser-Menü installiert werden.");}function doSyncQr(){if(!clickId("tabletSyncQrBtn"))clickId("syncQrBtn");}function addMenuItems(){const menu=$("tabletSideMenu");if(menu&&!$("kggV371TabletGroup")){const g=document.createElement("div");g.className="tabletSideMenuGroup";g.id="kggV371TabletGroup";g.innerHTML="<h3>Admin & Transfer</h3><p class=\"tabletSideHint\">Sonderfunktionen bleiben im Menü und verschieben das Hauptlayout nicht.</p>";g.append(createBtn("⚙️ Admin-Konfig",()=>clickId("adminConfigBtn")),createBtn("🏋️ Übungsdatenbank teilen",()=>clickId("sharedBankBtn")),createBtn("🔄 Sync-QR erzeugen",doSyncQr),createBtn("📲 Kolleg:innen-Web-App QR",showColleagueQr,"primaryLite"));menu.appendChild(g);}if(!$("kggV371PhoneMenuFab")){const fab=document.createElement("button");fab.id="kggV371PhoneMenuFab";fab.className="kggV371PhoneMenuFab";fab.type="button";fab.textContent="☰";fab.setAttribute("aria-label","Menü öffnen");const sheet=document.createElement("div");sheet.id="kggV371PhoneSheet";sheet.className="kggV371PhoneSheet";sheet.append(createBtn("⚙️ Admin-Konfig",()=>clickId("adminConfigBtn")),createBtn("🏋️ Übungsdatenbank teilen",()=>clickId("sharedBankBtn")),createBtn("🔄 Sync-QR",doSyncQr),createBtn("📲 Kolleg:innen-Web-App QR",showColleagueQr,"primaryLite"));fab.onclick=()=>document.body.classList.toggle("kggV371PhoneMenuOpen");document.body.append(fab,sheet);document.addEventListener("click",e=>{if(!document.body.classList.contains("kggV371PhoneMenuOpen"))return;if(e.target.closest("#kggV371PhoneMenuFab,#kggV371PhoneSheet,#kggV371QrModal"))return;document.body.classList.remove("kggV371PhoneMenuOpen")},true);}}document.readyState==="loading"?document.addEventListener("DOMContentLoaded",addMenuItems):addMenuItems();})();<\/script>';
  try{
    let h=await fetch(SOURCE,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('HTTP '+r.status);return r.text();});
    h=h.replace(/<title>.*?<\/title>/i,'<title>KGG Admin v371 Menue</title>');
    if(/<link rel="manifest"[^>]*>/i.test(h))h=h.replace(/<link rel="manifest"[^>]*>/i,'<link rel="manifest" href="'+MANIFEST_URL+'">');
    else h=h.replace('</head>','<link rel="manifest" href="'+MANIFEST_URL+'"></head>');
    h=h.replace('</head>',CSS+'\n</head>');
    h=h.replace('</body>',JS+'\n</body>');
    document.open();document.write(h);document.close();
  }catch(e){document.body.innerHTML='<div class="boot">Admin v371 konnte nicht geladen werden.<br><small>'+String(e).replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))+'</small></div>';}
})();
</script>
</body>
</html>
