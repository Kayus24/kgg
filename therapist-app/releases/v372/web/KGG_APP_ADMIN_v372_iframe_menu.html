<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1024">
<link rel="manifest" href="./kgg_admin_manifest.webmanifest">
<title>KGG Admin v372</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#e8eef6;color:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}#appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#e8eef6}.menuFab{position:fixed;left:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;width:54px;height:54px;border:1px solid rgba(10,16,36,.15);border-radius:18px;background:#fff;box-shadow:0 18px 42px rgba(7,16,39,.24);font-size:27px;font-weight:1000;color:#071027}.phoneSheet{position:fixed;left:14px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:29;width:min(335px,calc(100vw - 28px));display:none;gap:8px;background:rgba(255,255,255,.98);border:1px solid rgba(10,16,36,.12);border-radius:22px;padding:12px;box-shadow:0 18px 46px rgba(7,16,39,.25);backdrop-filter:blur(12px)}body.menuOpen .phoneSheet{display:grid}.item{width:100%;min-height:52px;border:1px solid rgba(10,16,36,.12);border-radius:17px;background:#fff;color:#071027;font-weight:1000;text-align:left;padding:0 13px;box-shadow:0 4px 12px rgba(7,16,39,.06)}.item.primaryLite{background:#edf5ff;color:#073254;border-color:#9cccf4}.drawer{position:fixed;left:0;top:0;bottom:0;z-index:28;width:min(360px,86vw);background:#fff;box-shadow:18px 0 42px rgba(7,16,39,.22);padding:18px 14px;transform:translateX(-105%);transition:transform .24s cubic-bezier(.2,.85,.2,1);display:grid;align-content:start;gap:8px}.drawer.open{transform:translateX(0)}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.drawerHead b{font-size:22px}.close{width:44px;height:44px;border:1px solid #dce3eb;border-radius:14px;background:#fff;font-size:24px;font-weight:1000}.shade{position:fixed;inset:0;z-index:27;background:rgba(7,16,39,.35);display:none}.shade.open{display:block}@media(min-width:760px){.menuFab{left:14px;top:14px;bottom:auto}.phoneSheet{display:none!important}}
.qrModal{position:fixed;inset:0;z-index:50;background:rgba(7,16,39,.42);display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px)}.qrModal.open{display:flex}.qrSheet{width:min(94vw,520px);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;padding:16px;box-shadow:0 22px 70px rgba(7,16,39,.28)}.qrBox{display:grid;place-items:center;min-height:280px;background:#fff;border:1px solid #dce3eb;border-radius:18px;padding:12px}.qrBox svg{width:100%;max-width:390px;height:auto}.qrText{width:100%;min-height:74px;margin-top:10px;border:1px solid #dce3eb;border-radius:14px;padding:10px;font-size:12px;word-break:break-all}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.primary{min-height:48px;border:0;border-radius:15px;background:#0a1024;color:#fff;font-weight:1000}.muted{min-height:48px;border:1px solid #dce3eb;border-radius:15px;background:#fff;color:#071027;font-weight:1000}.boot{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;background:#fff;border:1px solid #dce3eb;border-radius:22px;padding:18px 20px;box-shadow:0 10px 28px #0710271a;font-weight:900}
</style>
</head>
<body>
<div class="boot" id="boot">KGG Admin v372 wird geladen…</div>
<iframe id="appFrame" src="https://kayus24.github.io/kgg/therapist-app/releases/v366/web/KGG_APP_ADMIN_v366_mobile_floating_history_packages.html?v372frame=1"></iframe>
<div class="shade" id="shade"></div>
<aside class="drawer" id="drawer"><div class="drawerHead"><b>Menü</b><button class="close" id="closeDrawer" type="button">×</button></div></aside>
<button class="menuFab" id="menuFab" type="button" aria-label="Menü öffnen">☰</button>
<div class="phoneSheet" id="phoneSheet"></div>
<div class="qrModal" id="qrModal"><div class="qrSheet"><h2 id="qrTitle">QR</h2><p id="qrHint"></p><div class="qrBox" id="qrBox"></div><textarea class="qrText" id="qrText" readonly></textarea><div class="grid2"><button class="muted" id="copyQr" type="button">Link kopieren</button><button class="primary" id="closeQr" type="button">Schließen</button></div></div></div>
<script>
(function(){
const frame=document.getElementById('appFrame');
const boot=document.getElementById('boot');
const drawer=document.getElementById('drawer');
const shade=document.getElementById('shade');
const sheet=document.getElementById('phoneSheet');
const colleagueUrl='https://kayus24.github.io/kgg/therapist-app/releases/v371/web/KGG_APP_KOLLEGEN_v371_menu_webapp.html';
function inFrame(fn){try{const w=frame.contentWindow;const d=frame.contentDocument;if(w&&d)fn(w,d);}catch(e){}}
function clickInFrame(id){inFrame((w,d)=>{const el=d.getElementById(id);if(el)el.click();});}
function hideOldAdminUi(){inFrame((w,d)=>{let st=d.getElementById('kggV372FrameCss');if(!st){st=d.createElement('style');st.id='kggV372FrameCss';st.textContent='.adminTestBanner{display:none!important}.scanHub .adminConfigBtn,.scanHub .sharedBankBtn,.scanHub .syncQrBtn{display:none!important}@media(max-width:759px){.tabletMenuBtn{display:none!important}.scanHub{padding-top:18px!important}}';d.head.appendChild(st);} });}
function openDrawer(){drawer.classList.add('open');shade.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');shade.classList.remove('open');document.body.classList.remove('menuOpen');}
function makeItem(text,fn,cls){const b=document.createElement('button');b.type='button';b.className='item '+(cls||'');b.textContent=text;b.onclick=function(){closeDrawer();fn();};return b;}
function makeQr(raw){const qr=qrcode(0,'M');qr.addData(raw);qr.make();return qr.createSvgTag({cellSize:6,margin:4,scalable:true});}
function showQr(){document.getElementById('qrTitle').textContent='Kolleg:innen-Web-App öffnen';document.getElementById('qrHint').textContent='QR öffnet die Nicht-Admin-Web-App. In Chrome kann sie danach über Browser-Menü installiert werden.';document.getElementById('qrBox').innerHTML=makeQr(colleagueUrl);document.getElementById('qrText').value=colleagueUrl;document.getElementById('qrModal').classList.add('open');}
function syncQr(){clickInFrame('tabletSyncQrBtn');setTimeout(()=>clickInFrame('syncQrBtn'),120);}
function fillMenus(){const items=[makeItem('⚙️ Admin-Konfig',()=>clickInFrame('adminConfigBtn')),makeItem('🏋️ Übungsdatenbank teilen',()=>clickInFrame('sharedBankBtn')),makeItem('🔄 Sync-QR erzeugen',syncQr),makeItem('📲 Kolleg:innen-Web-App QR',showQr,'primaryLite')];items.forEach(x=>drawer.appendChild(x.cloneNode(true)));drawer.querySelectorAll('.item').forEach((b,i)=>b.onclick=items[i].onclick);items.forEach(x=>sheet.appendChild(x));}
fillMenus();
document.getElementById('menuFab').onclick=function(){if(matchMedia('(min-width:760px)').matches)openDrawer();else document.body.classList.toggle('menuOpen');};
document.getElementById('closeDrawer').onclick=closeDrawer;shade.onclick=closeDrawer;document.getElementById('closeQr').onclick=()=>document.getElementById('qrModal').classList.remove('open');document.getElementById('qrModal').onclick=e=>{if(e.target.id==='qrModal')document.getElementById('qrModal').classList.remove('open')};document.getElementById('copyQr').onclick=async()=>{const t=document.getElementById('qrText');try{await navigator.clipboard.writeText(t.value)}catch(e){t.focus();t.select();}};
frame.addEventListener('load',()=>{boot.style.display='none';hideOldAdminUi();setTimeout(hideOldAdminUi,500);setTimeout(hideOldAdminUi,1500);});
})();
</script>
</body>
</html>
