<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KGG CardLogic360 Gesture Test</title>
<style>
*{box-sizing:border-box}body{margin:0;padding:14px;background:#e8eef6;color:#071027;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.app{max-width:860px;margin:auto}.head,.panel{background:#fff;border:2px solid #111827;border-radius:24px;padding:14px;box-shadow:0 4px 14px rgba(7,16,39,.08)}.head{margin-bottom:12px}h1{font-size:22px;margin:0 0 6px}.muted{color:#657386;font-weight:800}.planList{display:grid;gap:8px;margin-top:10px}.planCard{position:relative;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid #dce3eb;border-radius:18px;background:#fff;padding:14px 46px 14px 14px;box-shadow:0 2px 10px rgba(7,16,39,.055);touch-action:pan-y;overflow:hidden}.planMain{display:flex;align-items:center;gap:10px;min-width:0}.drag{width:38px;height:38px;min-width:38px;border:1px solid #dce3eb;border-radius:999px;background:#fff;font-size:18px;touch-action:none}.planCard b{font-size:19px}.planCard small{display:block;color:#657386;font-weight:850;margin-top:3px}.del{position:absolute;top:6px;right:8px;width:30px;height:30px;border:0;border-radius:999px;background:#fff5f7;color:#e23b54;font-size:20px;font-weight:1000}.drag.reorder-armed{background:#dcecff;box-shadow:0 0 0 3px rgba(94,167,232,.25)}.planCard.reorder-prelift{transform:scale(1.006);box-shadow:0 8px 20px rgba(7,16,39,.15)}.planCard.reorder-lifted{position:fixed!important;z-index:80;left:var(--x);top:var(--y);width:var(--w);transform:translateY(var(--dy,0px)) scale(1.035);opacity:.98;box-shadow:0 22px 42px rgba(7,16,39,.16);pointer-events:none}.placeholder{min-height:66px;border-radius:999px;background:radial-gradient(ellipse at center,rgba(7,16,39,.18),rgba(7,16,39,0) 70%);filter:blur(2px)}.swipe{transition:none;box-shadow:0 8px 22px rgba(7,16,39,.14)}.swipe:after{content:'Löschen';position:absolute;top:50%;right:14px;transform:translateY(-50%);padding:6px 10px;border-radius:999px;background:rgba(226,59,84,.1);color:#b01830;font-size:12px;font-weight:1000;opacity:var(--s,0)}.swipe.right:after{left:14px;right:auto}.armed{background:#fffafa}.log{margin-top:12px;padding:10px;border-radius:14px;background:#071027;color:white;font:12px ui-monospace,monospace;white-space:pre-wrap}
</style>
</head>
<body>
<div class="app"><div class="head"><h1>KGG TEST: v389-Kartenoptik + 360-Hold-Logik</h1><div class="muted">Drag startet erst nach kurzem Halten. Bewegung vor Hold bricht Drag ab. Swipe links/rechts bleibt testbar. Keine PDF/QR/Scan/Parser-Logik.</div></div><div class="panel"><b>Übungen im Plan</b><div id="list" class="planList"></div><div id="log" class="log">Bereit.</div></div></div>
<script>
const plan=[['a','Beinpresse','3 Sätze · 25 kg · 12 Wdh'],['b','Rudern sitzend','3 Sätze · 20 kg · 12 Wdh'],['c','Knieextension','3 Sätze · 15 kg · 12 Wdh'],['d','Plank','3 Sätze · 45 Sek.']];let reorder=null;const list=document.getElementById('list'),log=t=>document.getElementById('log').textContent=t;
function render(){list.innerHTML=plan.map((p,i)=>`<div class="planCard" data-id="${p[0]}"><div class="planMain"><button class="drag" data-id="${p[0]}">⠿</button><span><b>${i+1}. ${p[1]}</b><small>${p[2]}</small></span></div><button class="del" data-del="${p[0]}">×</button></div>`).join('');list.querySelectorAll('.drag').forEach(b=>b.addEventListener('pointerdown',startHoldDrag,{passive:false}));list.querySelectorAll('.planCard').forEach(c=>c.addEventListener('pointerdown',startSwipe,{passive:false}));list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>remove(b.dataset.del));}
function remove(id){const i=plan.findIndex(p=>p[0]===id);if(i>=0){log('Gelöscht: '+plan[i][1]);plan.splice(i,1);render();}}
function startSwipe(e){if(e.target.closest('button'))return;if(reorder)return;const card=e.currentTarget,id=card.dataset.id,sx=e.clientX,sy=e.clientY;let active=false,dx=0;const threshold=()=>Math.min(132,Math.max(78,card.offsetWidth*.34));function cleanup(){document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up)}function reset(){card.classList.remove('swipe','armed','right');card.style.cssText=''}function move(ev){dx=ev.clientX-sx;const dy=ev.clientY-sy;if(!active){if(Math.abs(dy)>10&&Math.abs(dy)>Math.abs(dx)*1.2){cleanup();return}if(Math.abs(dx)<12||Math.abs(dx)<Math.abs(dy)*1.25)return;active=true;card.classList.add('swipe')}ev.preventDefault();const max=card.offsetWidth*.86;dx=Math.max(-max,Math.min(max,dx));const s=Math.min(1,Math.abs(dx)/threshold());card.classList.toggle('right',dx>0);card.classList.toggle('armed',Math.abs(dx)>=threshold());card.style.setProperty('--s',s);card.style.transform=`translateX(${dx}px)`;card.style.opacity=1-s*.16}function up(ev){cleanup();if(!active){reset();return}ev.preventDefault();if(Math.abs(dx)>=threshold()){const dir=dx<0?-1:1;card.style.transition='transform .18s ease,opacity .18s ease';card.style.transform=`translateX(${dir*(card.offsetWidth+96)}px)`;card.style.opacity=0;setTimeout(()=>remove(id),190)}else{card.style.transition='transform .22s ease,opacity .18s ease';card.style.transform='translateX(0)';card.style.opacity=1;setTimeout(reset,230)}}document.addEventListener('pointermove',move,{passive:false});document.addEventListener('pointerup',up,{passive:false,once:true});}
function startHoldDrag(e){if(e.button!=null&&e.button!==0)return;if(reorder)return;const h=e.currentTarget,card=h.closest('.planCard'),id=h.dataset.id,sx=e.clientX,sy=e.clientY;const press={h,card,id,sx,sy,active:false,cancelled:false,timer:null,ph:null};reorder=press;h.classList.add('reorder-armed');card.classList.add('reorder-prelift');function cancel(){if(!reorder||press.active)return;press.cancelled=true;cleanup(false)}function preMove(ev){if(!reorder||press.active)return;const dx=Math.abs(ev.clientX-sx),dy=Math.abs(ev.clientY-sy);if(dx>12||dy>12)cancel()}function activate(ev){if(!reorder||press.active||press.cancelled)return;ev.preventDefault&&ev.preventDefault();const r=card.getBoundingClientRect();const ph=document.createElement('div');ph.className='placeholder';ph.style.height=Math.max(48,r.height)+'px';card.after(ph);press.ph=ph;press.active=true;press.startTop=r.top;card.classList.remove('reorder-prelift');card.classList.add('reorder-lifted');card.style.setProperty('--x',r.left+'px');card.style.setProperty('--y',r.top+'px');card.style.setProperty('--w',r.width+'px');document.removeEventListener('pointermove',preMove);document.addEventListener('pointermove',move,{passive:false});document.addEventListener('pointerup',finish,{passive:false,once:true});log('Drag aktiv nach Hold')}function move(ev){if(!reorder||!press.active)return;ev.preventDefault();const dy=ev.clientY-sy;card.style.setProperty('--dy',dy+'px');const mid=press.startTop+dy+card.getBoundingClientRect().height/2;const cards=[...list.querySelectorAll('.planCard:not(.reorder-lifted)')];let target=cards.length;for(let i=0;i<cards.length;i++){const r=cards[i].getBoundingClientRect();if(mid<r.top+r.height/2){target=i;break}}const ref=cards[target]||null;if(ref)list.insertBefore(press.ph,ref);else list.appendChild(press.ph)}function finish(ev){if(!reorder||!press.active){cleanup(false);return}ev.preventDefault();const from=plan.findIndex(p=>p[0]===id);let to=[...list.children].indexOf(press.ph);if(to>from)to--;to=Math.max(0,Math.min(plan.length-1,to));if(from>=0&&from!==to){const item=plan.splice(from,1)[0];plan.splice(to,0,item);log('Verschoben: '+item[1])}cleanup(true);render()}function cleanup(){clearTimeout(press.timer);document.removeEventListener('pointermove',preMove);document.removeEventListener('pointermove',move);h.classList.remove('reorder-armed');card.classList.remove('reorder-prelift','reorder-lifted');card.style.cssText='';if(press.ph)press.ph.remove();reorder=null}document.addEventListener('pointermove',preMove,{passive:false});document.addEventListener('pointerup',()=>cleanup(false),{passive:true,once:true});press.timer=setTimeout(()=>activate({clientX:sx,clientY:sy,preventDefault:()=>{}}),120);}
render();
</script>
</body>
</html>
