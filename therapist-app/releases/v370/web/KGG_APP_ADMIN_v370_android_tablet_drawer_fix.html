<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KGG App Admin v370 Android Tablet Drawer Fix</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#e8eef6;color:#071027;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.load{background:#fff;border:1px solid #dce3eb;border-radius:22px;padding:18px 20px;box-shadow:0 10px 28px #0710271a;font-weight:900}</style>
</head>
<body>
  <div class="load">KGG App wird geladen…</div>
  <script>
(async()=>{
  const source="https://kayus24.github.io/kgg/therapist-app/releases/v366/web/KGG_APP_ADMIN_v366_mobile_floating_history_packages.html";
  const base="https://kayus24.github.io/kgg/therapist-app/releases/v366/web/";
  const css="html.kggAndroidTabletFix{background:#e8eef6}@media (min-width:760px) and (pointer:coarse){html.kggAndroidTabletFix body{overflow-x:hidden}html.kggAndroidTabletFix .app{width:min(100%,1180px);padding:14px 14px 24px;gap:10px}html.kggAndroidTabletFix .scanHub{gap:8px;padding:10px;border-radius:18px}html.kggAndroidTabletFix .scanHub .scanBtn,html.kggAndroidTabletFix .scanHub .scanMeta,html.kggAndroidTabletFix .adminMode .scanHub .adminConfigBtn,html.kggAndroidTabletFix .adminMode .scanHub .sharedBankBtn{height:50px;min-height:50px;padding:0 12px;font-size:16px;border-radius:14px}html.kggAndroidTabletFix .panel{border-radius:22px;padding:10px}html.kggAndroidTabletFix .panel .inner{grid-template-columns:minmax(340px,42%) minmax(0,1fr);gap:8px 12px;min-height:520px}html.kggAndroidTabletFix .baseCard,html.kggAndroidTabletFix .drawerBtn{min-height:50px;padding:10px 12px;font-size:16px;border-radius:14px}html.kggAndroidTabletFix textarea{font-size:18px;min-height:96px}html.kggAndroidTabletFix .planHeader .panelTitle{font-size:26px}html.kggAndroidTabletFix .planCard{padding:8px 10px;border-radius:14px}html.kggAndroidTabletFix .planCard b{font-size:15px}html.kggAndroidTabletFix .planCard small{font-size:11px}html.kggAndroidTabletFix .bankRows{max-height:390px}html.kggAndroidTabletFix #planList{max-height:490px}}.kggMenuBtn{position:fixed;right:16px;top:16px;z-index:74;width:50px;height:50px;border:1px solid #dce3eb;border-radius:18px;background:#fff;color:#071027;box-shadow:0 10px 28px #07102729;font-size:26px;font-weight:1000}.kggShade{position:fixed;inset:0;z-index:90;background:#07102757;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.22s}.kggDrawer{position:fixed;right:0;top:0;z-index:91;width:min(360px,86vw);height:100dvh;background:#fff;box-shadow:-18px 0 42px #07102738;transform:translateX(104%);transition:transform .28s cubic-bezier(.2,.85,.2,1);padding:20px 14px;display:flex;flex-direction:column;gap:10px}.kggShade.open{opacity:1;pointer-events:auto}.kggDrawer.open{transform:translateX(0)}.kggHead{display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:1000}.kggClose{width:44px;height:44px;border:1px solid #dce3eb;border-radius:14px;background:#fff;font-size:22px;font-weight:1000}.kggItem{width:100%;min-height:52px;border:1px solid #dce3eb;border-radius:16px;background:#f8fafc;font-weight:950;text-align:left;padding:0 14px}";
  const js="(()=>{document.documentElement.classList.add('kggAndroidTabletFix');const q=s=>document.querySelector(s),hit=a=>{for(const s of a){const e=q(s);if(e){e.click();return}}};function init(){if(q('.kggMenuBtn'))return;const b=document.createElement('button'),s=document.createElement('div'),p=document.createElement('aside');b.className='kggMenuBtn';b.type='button';b.textContent='\u2630';b.setAttribute('aria-label','Men\u00fc \u00f6ffnen');s.className='kggShade';p.className='kggDrawer';p.innerHTML='<div class=\"kggHead\">Men\u00fc <button class=\"kggClose\" type=\"button\">\u00d7</button></div><button class=\"kggItem\" data-a=\"base\">\ud83d\udc64 Basisdaten</button><button class=\"kggItem\" data-a=\"history\">\ud83d\udd58 Plan-Historie</button><button class=\"kggItem\" data-a=\"packages\">\ud83d\udce6 \u00dcbungspakete</button><button class=\"kggItem\" data-a=\"admin\">\u2699\ufe0f Admin-Konfig</button><button class=\"kggItem\" data-a=\"share\">\ud83d\udd17 \u00dcbungsdatenbank teilen</button><button class=\"kggItem\" data-a=\"finish\">\u2705 Fertig</button><small style=\"margin-top:auto;color:#657386;font-weight:800\">Overlay-Men\u00fc: Hauptlayout wird nicht verschoben.</small>';document.body.append(b,s,p);const open=()=>{s.classList.add('open');p.classList.add('open')},close=()=>{s.classList.remove('open');p.classList.remove('open')};b.onclick=open;s.onclick=close;p.querySelector('.kggClose').onclick=close;p.onclick=e=>{const it=e.target.closest('.kggItem');if(!it)return;close();setTimeout(()=>{const a=it.dataset.a;if(a==='base')hit(['#baseToggle']);if(a==='history')hit(['#recentToggle']);if(a==='packages')hit(['#packageToggle']);if(a==='admin')hit(['#adminConfigBtn','.adminConfigBtn']);if(a==='share')hit(['#sharedBankBtn','.sharedBankBtn']);if(a==='finish')hit(['#finishBtn','.finishBtn'])},70)};document.addEventListener('keydown',e=>{if(e.key==='Escape')close()})}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init()})();";
  try{
    let h=await fetch(source,{cache:"no-store"}).then(r=>{if(!r.ok)throw Error("HTTP "+r.status);return r.text()});
    if(!/<base\s/i.test(h))h=h.replace(/<head([^>]*)>/i,'<head$1><base href="'+base+'">');
    h=h.replace(/<title>(.*?)<\/title>/i,'<title>KGG App Admin v370 Android Tablet Drawer Fix</title>');
    h=h.includes("</style>")?h.replace("</style>",css+"\n</style>"):h.replace("</head>","<style>"+css+"</style></head>");
    h=h.replace("</body>","<script>"+js.replace(/<\/script/gi,"<\\/script")+"<\/script></body>");
    document.open();document.write(h);document.close();
  }catch(e){document.body.innerHTML='<div class="load">App konnte nicht geladen werden.<br><small>'+String(e).replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))+'</small></div>';}
})();
  </script>
</body>
</html>
