name: Generate KGG Update Payload

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to update"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate v004 payload
        run: |
          python3 scripts/apply_v004_phone_hide_admin_banner.py

      - name: Normalize doctype and SHA
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import sys

          html_path = Path("kgg-update/index.html")
          json_path = Path("kgg-update/version.json")

          data = html_path.read_bytes()
          lower = data.lower()
          needle = b"<!doctype html"
          idx = lower.find(needle)

          if idx < 0:
              print("ERROR: <!doctype html> not found")
              sys.exit(1)

          if idx > 0:
              print(f"Removing {idx} leading byte(s) before <!doctype html>")
              data = data[idx:]
              html_path.write_bytes(data)

          if not data.lower().startswith(needle):
              print("ERROR: HTML does not start with <!doctype html>")
              sys.exit(1)

          text = data.decode("utf-8", errors="replace")
          required_patch = "@media (max-width:759px)"
          required_rule = ".adminTestBanner"

          if required_patch not in text or required_rule not in text:
              print("ERROR: phone admin banner patch not found")
              sys.exit(1)

          sha = hashlib.sha256(data).hexdigest()

          manifest = json.loads(json_path.read_text(encoding="utf-8"))
          manifest["sha256"] = sha
          json_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          print("SHA256:", sha)
          print("versionCode:", manifest.get("versionCode"))
          print("versionName:", manifest.get("versionName"))
          PY

      - name: Guard allowed files
        run: |
          changed="$(git diff --name-only)"
          echo "$changed"

          allowed="kgg-update/index.html
          kgg-update/version.json"

          for file in $changed; do
            case "$file" in
              kgg-update/index.html|kgg-update/version.json)
                ;;
              *)
                echo "ERROR: unexpected changed file: $file"
                exit 1
                ;;
            esac
          done

      - name: Commit generated payload
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add kgg-update/index.html kgg-update/version.json
          git commit -m "Generate KGG update payload"
          git push
