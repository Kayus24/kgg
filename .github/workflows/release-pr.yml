name: Validate and build KGG admin beta

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'release-inbox/**'
      - 'release-pipeline/**'
      - 'kgg-update/**'
      - 'therapist-app/android_update_manifest.json'
      - 'therapist-app/releases/web/**'
      - '.github/workflows/release-pr.yml'
      - '.github/workflows/kgg-required-gate.yml'

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: kgg-release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  validate-build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Classify pull request scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          pipeline_only=true
          for path in "${changed[@]}"; do
            case "$path" in
              release-pipeline/*|.github/workflows/release-pr.yml|.github/workflows/kgg-required-gate.yml) ;;
              *) pipeline_only=false ;;
            esac
          done
          echo "pipeline_only=$pipeline_only" >> "$GITHUB_OUTPUT"

      - name: Build immutable profile artifacts when an inbox payload exists
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f release-inbox/admin.html || -f release-inbox/release.json ]]; then
            test -f release-inbox/admin.html
            test -f release-inbox/release.json
            python release-pipeline/release_pipeline.py prepare \
              --candidate release-inbox/admin.html \
              --release-json release-inbox/release.json
            rm release-inbox/admin.html release-inbox/release.json
            echo "prepared=true" >> "$GITHUB_OUTPUT"
          else
            echo "prepared=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run critical KGG test battery
        shell: bash
        env:
          KGG_ALLOW_RELEASE_DRIFT: ${{ steps.scope.outputs.pipeline_only == 'true' && '1' || '' }}
        run: python release-pipeline/kgg_test_battery.py --level critical

      - name: Commit generated artifacts back to the PR branch
        if: steps.prepare.outputs.prepared == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A release-inbox therapist-app/android_update_manifest.json therapist-app/releases/web
          git commit -m 'chore: build immutable KGG beta artifacts'
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Detect Admin beta merge candidate
        id: admin_beta
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          if [[ '${{ steps.prepare.outputs.prepared }}' == 'true' ]]; then
            ready=true
          elif git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
            | grep -Eq '^(therapist-app/releases/web/[^/]+/(admin|kollegen)\.html|therapist-app/android_update_manifest\.json)$'; then
            ready=true
          fi
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Keep Admin beta PR open without explicit auto-merge label
        if: steps.admin_beta.outputs.ready == 'true' && startsWith(github.event.pull_request.title, '[admin-beta]') && !contains(github.event.pull_request.labels.*.name, 'kgg-auto-merge')
        shell: bash
        run: |
          {
            echo 'Admin beta auto-merge skipped.'
            echo ''
            echo 'Add the `kgg-auto-merge` label after reviewing the PR if it should merge automatically.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for required gate before guarded merge
        if: steps.admin_beta.outputs.ready == 'true' && startsWith(github.event.pull_request.title, '[admin-beta]') && contains(github.event.pull_request.labels.*.name, 'kgg-auto-merge')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checks '${{ github.event.pull_request.number }}' --repo '${{ github.repository }}' --required --watch --fail-fast

      - name: Merge confirmed Admin beta PR after successful checks
        if: steps.admin_beta.outputs.ready == 'true' && startsWith(github.event.pull_request.title, '[admin-beta]') && contains(github.event.pull_request.labels.*.name, 'kgg-auto-merge')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge '${{ github.event.pull_request.number }}' --repo '${{ github.repository }}' --squash
