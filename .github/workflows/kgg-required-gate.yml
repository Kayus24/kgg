name: KGG Required Gate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: kgg-required-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  required-gate:
    name: required-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Poppler for PDF readability smoke
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Classify pull request scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_file="$RUNNER_TEMP/kgg-changed-files.txt"
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD | tee "$changed_file"

          pipeline_only=true
          ui_or_html=false
          patient_scan=false

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              .github/workflows/*|release-pipeline/*|release-pipeline/**) ;;
              *) pipeline_only=false ;;
            esac
          done < "$changed_file"

          if grep -Eq '(^|/)[^/]+\.(html|css)$|^kgg-update/|^therapist-app/test-lab/|^therapist-app/releases/web/|^release-pipeline/kgg_ui_stability_smoke\.js$' "$changed_file"; then
            ui_or_html=true
          fi

          if grep -Eq '^patient-start-scan\.js$|^index\.html$|^service-worker\.js$|^patient-(media-retry-cache_v2|multiplan-db)\.js$|^release-pipeline/kgg_patient_scan_camera_smoke\.js$|^release-pipeline/patient-scan-fixtures/|^release-pipeline/package(-lock)?\.json$' "$changed_file"; then
            patient_scan=true
          fi

          echo "pipeline_only=$pipeline_only" >> "$GITHUB_OUTPUT"
          echo "ui_or_html=$ui_or_html" >> "$GITHUB_OUTPUT"
          echo "patient_scan=$patient_scan" >> "$GITHUB_OUTPUT"

      - name: Run critical KGG test battery
        shell: bash
        env:
          KGG_ALLOW_RELEASE_DRIFT: ${{ steps.scope.outputs.pipeline_only == 'true' && '1' || '' }}
        run: python release-pipeline/kgg_test_battery.py --level critical

      - name: Check Custom GPT live context freshness
        shell: bash
        run: python release-pipeline/kgg_gpt_context.py --check

      - name: Check Custom GPT bug knowledge freshness
        shell: bash
        run: python release-pipeline/kgg_bug_knowledge.py --check

      - name: Check Custom GPT source context freshness
        shell: bash
        run: python release-pipeline/kgg_gpt_source_context.py --check

      - name: Check Custom GPT knowledge pack freshness
        shell: bash
        run: python release-pipeline/kgg_custom_gpt_knowledge_pack.py --check

      - name: Check Custom GPT resource contract freshness
        shell: bash
        run: python release-pipeline/kgg_custom_gpt_resource_audit.py --check

      - name: Check blind Repair-Lab contracts
        shell: bash
        run: |
          python release-pipeline/kgg_gpt_repair_lab.py --self-test
          python release-pipeline/kgg_gpt_repair_stabilize.py --self-test

      - name: Run UI stability regression for UI or HTML changes
        if: steps.scope.outputs.ui_or_html == 'true'
        shell: bash
        run: python release-pipeline/kgg_test_battery.py --suite ui-stability --level regression

      - name: Run patient QR camera regression
        if: steps.scope.outputs.patient_scan == 'true'
        shell: bash
        run: python release-pipeline/kgg_test_battery.py --suite patient-scan --level regression
