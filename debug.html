<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KGG Debug JSON</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#111827;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}main{max-width:760px;margin:auto;padding:14px}.card{background:#fff;border:1px solid #dbe3ef;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 22px #0f172a0d}h1{font-size:24px;margin:0 0 6px}p{color:#64748b;font-size:14px;line-height:1.45}button{width:100%;min-height:50px;margin-top:12px;border:1px solid #111827;border-radius:14px;background:#111827;color:#fff;font-size:16px;font-weight:900}pre{white-space:pre-wrap;word-break:break-word;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;font-size:12px;line-height:1.4}</style></head><body><main><section class="card"><h1>KGG Debug JSON</h1><p>Öffne diese Seite einmal normal in Chrome und einmal über die installierte App, falls möglich. Lade dann die JSON-Datei herunter und schick sie hier.</p><button onclick="downloadDebug()">Debug JSON herunterladen</button><pre id="out">Debug wird geladen…</pre></section></main><script>async function buildDebug(){const ls={};try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);const v=localStorage.getItem(k);ls[k]={length:v?v.length:0,prefix:v?v.slice(0,140):null}}}catch(e){ls.__error=String(e&&e.message||e)}let cacheNames=[];try{if(window.caches)cacheNames=await caches.keys()}catch(e){cacheNames=['CACHE_ERROR: '+String(e&&e.message||e)]}let regs=[];try{if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations){const r=await navigator.serviceWorker.getRegistrations();regs=r.map(x=>({scope:x.scope,active:x.active?x.active.scriptURL:null,waiting:x.waiting?x.waiting.scriptURL:null,installing:x.installing?x.installing.scriptURL:null}))}}catch(e){regs=[{error:String(e&&e.message||e)}]}let estimate=null;try{if(navigator.storage&&navigator.storage.estimate)estimate=await navigator.storage.estimate()}catch(e){estimate={error:String(e&&e.message||e)}}let persisted=null;try{if(navigator.storage&&navigator.storage.persisted)persisted=await navigator.storage.persisted()}catch(e){persisted='ERROR: '+String(e&&e.message||e)}return{app:'kgg-handyplan-debug',debugVersion:1,createdAt:new Date().toISOString(),location:{href:location.href,origin:location.origin,pathname:location.pathname,search:location.search,hashLength:location.hash.length,hashPrefix:location.hash.slice(0,100)},displayMode:{standalone:matchMedia('(display-mode: standalone)').matches,fullscreen:matchMedia('(display-mode: fullscreen)').matches,minimalUi:matchMedia('(display-mode: minimal-ui)').matches,navigatorStandalone:window.navigator.standalone||false},browser:{userAgent:navigator.userAgent,language:navigator.language,platform:navigator.platform,cookieEnabled:navigator.cookieEnabled,online:navigator.onLine},storage:{localStorageAvailable:(()=>{try{localStorage.setItem('__kgg_test','1');localStorage.removeItem('__kgg_test');return true}catch(e){return false}})(),persisted,estimate,keys:Object.keys(ls),values:ls,kggLastPlanHashExists:!!localStorage.getItem('kggLastPlanHash'),kggLastPlanHashLength:(localStorage.getItem('kggLastPlanHash')||'').length,kggLastPlanHashPrefix:(localStorage.getItem('kggLastPlanHash')||'').slice(0,120)},serviceWorker:{supported:'serviceWorker'in navigator,controller:navigator.serviceWorker&&navigator.serviceWorker.controller?navigator.serviceWorker.controller.scriptURL:null,registrations:regs},caches:{supported:'caches'in window,names:cacheNames},diagnosisHints:{hasHashKGGH2:location.hash.startsWith('#KGGH2:'),hasStoredPlanHash:!!localStorage.getItem('kggLastPlanHash'),likelyProblem:!location.hash.startsWith('#KGGH2:')&&!localStorage.getItem('kggLastPlanHash')?'No current hash and no stored kggLastPlanHash':'Needs manual review'}}}async function showDebug(){const d=await buildDebug();document.getElementById('out').textContent=JSON.stringify(d,null,2);return d}async function downloadDebug(){const d=await showDebug();const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kgg-handyplan-debug-'+new Date().toISOString().replace(/[:.]/g,'-')+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000)}showDebug();</script></body></html>
