<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KGG Testdaten werden geladen</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f7fb;color:#111827;margin:0;display:grid;place-items:center;min-height:100dvh;padding:18px}
.card{max-width:520px;background:white;border:1px solid #dbe3ef;border-radius:22px;padding:18px;box-shadow:0 14px 44px rgba(15,23,42,.12)}
h1{font-size:22px;margin:0 0 8px}.muted{color:#64748b;font-size:14px;line-height:1.35}.btn{display:inline-flex;margin-top:14px;min-height:46px;align-items:center;justify-content:center;border-radius:14px;border:1px solid #111827;background:#111827;color:white;padding:0 14px;font-weight:950;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>Testdaten werden geladen…</h1>
  <p class="muted">2 Trainingspläne, 4 benutzte Trainingstage und Beispielwerte werden lokal auf diesem Gerät gespeichert.</p>
  <a id="go" class="btn" href="./">Falls nichts passiert: App öffnen</a>
</div>
<script>
(function(){
  const CURRENT_KEY='kggCurrentPlanV1';
  const MULTI_KEY='kggPatientMultiPlansV1';
  const SETTINGS_KEY='kggPatientExerciseSettingsV1';

  const planA={
    i:'test-plan-a-kraft',
    t:'Plan A · Kraft Unterkörper',
    v:1,d:6,extendDays:true,stepDays:6,
    e:[
      ['Beinpresse',3,'BI','kg','Wdh','45','12'],
      ['Rudern sitzend',3,'BI','kg','Wdh','30','12'],
      ['Latzug',3,'BI','kg','Wdh','35','12'],
      ['Plank',3,'BI','Sek.','Sek.','30','30']
    ]
  };
  const planB={
    i:'test-plan-b-stabi',
    t:'Plan B · Stabilität & Ausdauer',
    v:1,d:6,extendDays:true,stepDays:6,
    e:[
      ['Schulterpresse',3,'BI','kg','Wdh','12','12'],
      ['Beinstrecker',3,'BI','kg','Wdh','25','12'],
      ['Romanian Deadlift',3,'BI','kg','Wdh','20','10'],
      ['Ergometer',1,'BI','Stufe','Min.','5','10']
    ]
  };

  function exObj(e){return{n:e[0]||'Übung',sets:Number(e[1])||3,side:e[2]||'LR',u:e[3]||'kg',m:e[4]||'Wdh',sl:e[5]||'',sm:e[6]||'',media:e[7]||'',videoUrl:e[8]||'',videoLabel:e[9]||'Video öffnen'}}
  function ph(rawPlan){
    const p={id:rawPlan.i,title:rawPlan.t,ex:(rawPlan.e||[]).map(exObj)};
    const raw=JSON.stringify({i:p.id,t:p.title,e:p.ex.map(e=>[e.n,e.sets,e.side,e.u,e.m])});
    let h=2166136261;
    for(let i=0;i<raw.length;i++){h^=raw.charCodeAt(i);h=Math.imul(h,16777619)}
    return (h>>>0).toString(36);
  }
  function base(rawPlan){return 'kgg-'+rawPlan.i+'-'+ph(rawPlan)}
  function key(day,ei,s,side,kind){return day+'|'+ei+'|'+s+'|'+side+'|'+kind}
  function seedValues(rawPlan,offset){
    const values={};
    for(let day=1;day<=4;day++){
      rawPlan.e.forEach((e,ei)=>{
        const sets=Number(e[1])||3;
        const side=e[2]==='LR'?'LR':'BI';
        for(let s=1;s<=sets;s++){
          if(side==='LR'){
            values[key(day,ei,s,'L','a')]=String(Number(e[5]||10)+offset+day+s-1);
            values[key(day,ei,s,'L','b')]=String(Math.max(6,Number(e[6]||10)-((day+s)%2)));
            values[key(day,ei,s,'R','a')]=String(Number(e[5]||10)+offset+day+s);
            values[key(day,ei,s,'R','b')]=String(Math.max(6,Number(e[6]||10)-((day+s+1)%2)));
          }else{
            values[key(day,ei,s,'B','a')]=String(Number(e[5]||10)+offset+day+s-1);
            values[key(day,ei,s,'B','b')]=String(Math.max(6,Number(e[6]||10)-((day+s)%2)));
          }
        }
        values[key(day,ei,0,'P','pain')]=String((day+ei+offset)%5);
      });
    }
    const b=base(rawPlan);
    localStorage.setItem(b+'-values',JSON.stringify(values));
    localStorage.setItem(b+'-done',JSON.stringify([1,2,3,4]));
    localStorage.setItem(b+'-meta',JSON.stringify({lastSavedAt:new Date().toISOString(),lastOpenDay:5,lastCompletedDay:4,storageVersion:6}));
  }
  function enc(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}

  localStorage.setItem(CURRENT_KEY,JSON.stringify({plan:planA,importedAt:new Date().toISOString()}));
  localStorage.setItem(MULTI_KEY,JSON.stringify({version:1,plans:[planA,planB],active:0,day:{'5':0},updatedAt:new Date().toISOString()}));
  localStorage.setItem(SETTINGS_KEY,JSON.stringify({}));
  seedValues(planA,0);
  seedValues(planB,3);
  localStorage.removeItem('kggInstallAsked');

  const target='./?v=two-plan-four-days-1#KGGH2:'+enc(JSON.stringify(planA));
  document.getElementById('go').href=target;
  setTimeout(()=>{location.replace(target)},350);
})();
</script>
</body>
</html>
