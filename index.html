<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KGG Handyplan</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#111827"><script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#111827;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}main{max-width:720px;margin:auto;padding:14px}.card{background:#fff;border:1px solid #dbe3ef;border-radius:18px;padding:14px;margin-bottom:12px}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0 0 8px}h3{font-size:17px;margin:0 0 8px}.muted{color:#64748b}.days{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:10px}.days button{min-height:44px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font-weight:800}.days .active{background:#111827;color:#fff}.days .done{border-color:#16a34a;color:#166534}.ex{border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin-top:10px}.set{border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px}.set:first-of-type{border-top:0;margin-top:0;padding-top:0}.lr{display:grid;grid-template-columns:34px 1fr 1fr;gap:6px;align-items:center;margin-top:6px}.bi{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}input{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:16px}.status{padding:10px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;font-weight:700}.pain{margin-top:12px}.painRow{display:grid;grid-template-columns:1fr 58px;gap:10px;align-items:center;margin-top:8px}.painRow input[type=range]{padding:0;accent-color:#111827}.painVal{text-align:center;font-weight:900;background:#f8fafc;border:1px solid #cbd5e1;border-radius:12px;padding:9px}.btn{width:100%;min-height:50px;margin-top:14px;border:1px solid #111827;border-radius:14px;background:#111827;color:#fff;font-size:16px;font-weight:900}.btn2{width:100%;min-height:44px;margin-top:10px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;font-weight:800}.btnSmall{border:1px solid #cbd5e1;border-radius:999px;background:#fff;padding:8px 12px;font-weight:800}.qr{text-align:center}.qr img{max-width:min(82vw,360px);width:100%;height:auto}.sum{white-space:pre-wrap;font-family:monospace;font-size:12px;line-height:1.4;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-top:10px}.hide{display:none}.installRow{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:10px}.installBox{position:fixed;left:12px;right:12px;bottom:12px;z-index:50;max-width:720px;margin:auto;background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:14px;box-shadow:0 18px 46px rgba(15,23,42,.2)}.installBox h3{margin:0 0 4px}.installBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}.installHint{font-size:13px;color:#64748b;margin-top:8px}</style></head><body><main><section class="card"><h1>KGG Handyplan</h1><p class="muted">Werte direkt am Handy eintragen. Schmerz über den Regler 0–10 angeben.</p><div id="status" class="status">Plan wird geladen…</div><div id="installSmall" class="installRow hide"><span class="muted">Plan schneller wiederfinden?</span><button class="btnSmall" onclick="installApp(false)">Zum Startbildschirm</button></div></section><section id="plan" class="card hide"><h2 id="title"></h2><p id="meta" class="muted"></p><div id="days" class="days"></div><div id="list"></div><button class="btn" onclick="finish()">Training beenden & QR anzeigen</button></section><section id="end" class="card hide"><h2 id="endTitle"></h2><p id="endInfo" class="muted"></p><div id="qr" class="qr"></div><div id="sum" class="sum"></div><button class="btn2" onclick="$('end').classList.add('hide')">Zurück zum Plan</button></section></main><div id="installBox" class="installBox hide"><h3>Plan zum Startbildschirm hinzufügen?</h3><p class="muted">Dann findest du diesen Trainingsplan später wie eine App wieder. Die Eingaben bleiben auf diesem Gerät gespeichert.</p><div class="installBtns"><button class="btn2" onclick="dismissInstall()">Nein danke</button><button class="btn" style="margin-top:10px" onclick="installApp(true)">Hinzufügen</button></div><div id="installHint" class="installHint hide"></div></div><script>let p,d=1,v={},done=[],installPrompt=null;$=id=>document.getElementById(id);enc=s=>btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');dec=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)))};standalone=()=>matchMedia('(display-mode: standalone)').matches||navigator.standalone;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;if(p&&!standalone())$('installSmall').classList.remove('hide')});function maybeAskInstall(){if(standalone())return;if(localStorage.kggInstallAsked)return;$('installBox').classList.remove('hide');localStorage.kggInstallAsked='1'}function dismissInstall(){$('installBox').classList.add('hide');$('installSmall').classList.remove('hide')}async function installApp(){if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;$('installBox').classList.add('hide');return}let h=$('installHint');h.classList.remove('hide');h.innerHTML='Falls kein Installationsfenster erscheint: Browser-Menü öffnen und <b>Zum Startbildschirm hinzufügen</b> wählen.';$('installSmall').classList.remove('hide')}save=()=>{localStorage['kgg-'+p.id]=JSON.stringify(v);localStorage['kggdone-'+p.id]=JSON.stringify(done)};k=(e,s,x,y,day=d)=>`${day}|${e}|${s}|${x}|${y}`;val=(e,s,x,y)=>v[k(e,s,x,y)]||'';put=(e,s,x,y,z)=>{v[k(e,s,x,y)]=z;save();$('status').textContent='Automatisch gespeichert.'};pain=e=>v[k(e,0,'P','pain')]||'0';setPain=(e,x)=>{v[k(e,0,'P','pain')]=String(x);save();let out=$('painVal'+e);if(out)out.textContent=x+'/10';$('status').textContent='Automatisch gespeichert.'};next=()=>done.length?Math.min(Math.max(...done)+1,p.days):1;function load(){try{let h=location.hash.slice(1);if(!h.startsWith('KGGH2:'))throw Error('Kein gültiger Plan-Link.');let x=JSON.parse(dec(h.slice(6)));p={id:x.i||'plan',title:x.t||'KGG Trainingsplan',days:x.d||6,ex:x.e||[]};try{v=JSON.parse(localStorage['kgg-'+p.id]||'{}')}catch(e){}try{done=JSON.parse(localStorage['kggdone-'+p.id]||'[]')}catch(e){}d=next();$('status').textContent=done.length?`Plan geladen. Nächster Tag: T${d}.`:'Plan geladen.';render();setTimeout(maybeAskInstall,900)}catch(e){$('status').textContent=e.message}}function render(){$('plan').classList.remove('hide');$('title').textContent=p.title;$('meta').textContent=`${p.ex.length} Übungen · ${p.days} Trainingstage`;$('days').innerHTML=Array.from({length:p.days},(_,i)=>`<button class="${i+1==d?'active':''} ${done.includes(i+1)?'done':''}" onclick="d=${i+1};render()">T${i+1}</button>`).join('');$('list').innerHTML=p.ex.map((e,ei)=>{let[n,sets,side,u,m]=e,rows='';for(let s=1;s<=sets;s++)rows+=side=='LR'?`<div class="set"><b>Satz ${s}</b><div class="lr"><span>Li</span><input placeholder="${u}" value="${val(ei,s,'L','a')}" oninput="put(${ei},${s},'L','a',this.value)"><input placeholder="${m}" value="${val(ei,s,'L','b')}" oninput="put(${ei},${s},'L','b',this.value)"></div><div class="lr"><span>Re</span><input placeholder="${u}" value="${val(ei,s,'R','a')}" oninput="put(${ei},${s},'R','a',this.value)"><input placeholder="${m}" value="${val(ei,s,'R','b')}" oninput="put(${ei},${s},'R','b',this.value)"></div></div>`:`<div class="set"><b>Satz ${s}</b><div class="bi"><input placeholder="${u}" value="${val(ei,s,'B','a')}" oninput="put(${ei},${s},'B','a',this.value)"><input placeholder="${m}" value="${val(ei,s,'B','b')}" oninput="put(${ei},${s},'B','b',this.value)"></div></div>`;return `<div class="ex"><h3>${n}</h3><div class="muted">${sets} Sätze · ${side=='LR'?'links/rechts':'beidseitig'} · ${u} · ${m}</div>${rows}<div class="pain"><b>Schmerz 0–10</b><div class="painRow"><input type="range" min="0" max="10" step="1" value="${pain(ei)}" oninput="setPain(${ei},this.value)"><span class="painVal" id="painVal${ei}">${pain(ei)}/10</span></div></div></div>`}).join('')}function rows(day){return p.ex.map((e,ei)=>{let[n,sets,side,u,m]=e,r=[];for(let s=1;s<=sets;s++)r.push(side=='LR'?[v[k(ei,s,'L','a',day)]||'',v[k(ei,s,'L','b',day)]||'',v[k(ei,s,'R','a',day)]||'',v[k(ei,s,'R','b',day)]||'']:[v[k(ei,s,'B','a',day)]||'',v[k(ei,s,'B','b',day)]||'']);return[n,sets,side,u,m,r,v[k(ei,0,'P','pain',day)]||'0']})}function text(day){let o=[];rows(day).forEach(e=>{let[n,sets,side,u,m,r,pn]=e,l=[];r.forEach((x,i)=>{if(side=='LR'){if(x.some(Boolean))l.push(`${i+1}. Satz: ${x[0]||'?'} ${u} @ ${x[1]||'?'} ${m} li    ${x[2]||'?'} ${u} @ ${x[3]||'?'} ${m} re`)}else if(x.some(Boolean))l.push(`${i+1}. Satz: ${x[0]||'?'} ${u} @ ${x[1]||'?'} ${m}`)});if(l.length||Number(pn)>0)o.push(`${n} — Tag ${day}`,...l,Number(pn)>0?`Schmerz: ${pn}/10`:'','')});return o.join('\n').trim()}function finish(){if(!done.includes(d))done.push(d);done.sort((a,b)=>a-b);save();let q=qrcode(0,'M');q.addData('KGGD1:'+enc(JSON.stringify({v:1,i:p.id,d,e:rows(d)})));q.make();$('qr').innerHTML=q.createImgTag(6,4);$('sum').textContent=text(d)||'Keine Werte eingetragen.';$('endTitle').textContent=`Training T${d} beendet`;$('endInfo').textContent=d<p.days?`Beim nächsten Öffnen startet der Plan automatisch mit T${Math.min(Math.max(...done)+1,p.days)}. Zeige diesen QR dem Therapeuten.`:'Plan abgeschlossen. Zeige diesen QR dem Therapeuten.';$('end').classList.remove('hide');$('end').scrollIntoView({behavior:'smooth'});render()}load();</script></body></html>
