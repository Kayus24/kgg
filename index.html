<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KGG Handyplan</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#111827"><script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#111827;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}main{max-width:760px;margin:auto;padding:14px}.card{background:#fff;border:1px solid #dbe3ef;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 22px #0f172a0d}.muted{color:#64748b;font-size:13px;line-height:1.35}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0 0 8px}h3{font-size:17px;margin:0 0 8px}.status{padding:10px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;font-weight:700}.ok{background:#ecfdf5!important;border-color:#bbf7d0!important;color:#166534}.warn{background:#fffbeb!important;border-color:#fde68a!important;color:#92400e}.hide{display:none!important}.days{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:10px}.days button{min-height:44px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font-weight:800}.days .active{background:#111827;color:#fff}.days .done{border-color:#16a34a;color:#166534}.ex{border:1px solid #cbd5e1;border-radius:16px;padding:12px;margin-top:10px}.set{border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px}.lr{display:grid;grid-template-columns:34px 1fr 1fr;gap:6px;align-items:center;margin-top:6px}.bi{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}input{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:17px}.num{text-align:center;font-weight:900;background:#fff;cursor:pointer}.num:focus{outline:3px solid #111827}.pain{margin-top:12px}.painRow{display:grid;grid-template-columns:1fr 58px;gap:10px;align-items:center;margin-top:8px}.painRow input{padding:0;accent-color:#111827}.painVal{text-align:center;font-weight:900;background:#f8fafc;border:1px solid #cbd5e1;border-radius:12px;padding:9px}.btn,.btn2{width:100%;min-height:50px;margin-top:12px;border-radius:14px;font-size:16px;font-weight:900}.btn{border:1px solid #111827;background:#111827;color:#fff}.btn2{border:1px solid #cbd5e1;background:#fff;color:#111827}.btnSmall{border:1px solid #cbd5e1;border-radius:999px;background:#fff;padding:8px 12px;font-weight:800}.row{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:10px}.qr{text-align:center}.qr img{max-width:min(92vw,520px);width:100%;height:auto}.sum{white-space:pre-wrap;font-family:monospace;font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-top:10px}.installBox{position:fixed;left:12px;right:12px;bottom:12px;z-index:50;max-width:720px;margin:auto;background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:14px;box-shadow:0 18px 46px #0f172a33}.installBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}.help{margin-top:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;font-size:13px;line-height:1.4}.pad{position:fixed;inset:0;z-index:9999;background:#0008;display:flex;align-items:flex-end;justify-content:center;padding:0 8px env(safe-area-inset-bottom)}.padBox{width:min(100%,520px);background:#fff;border-radius:24px 24px 0 0;padding:14px;box-shadow:0 -18px 48px #0004}.padTitle{text-align:center;font-size:13px;color:#64748b;font-weight:800;margin-bottom:8px}.padVal{font-size:40px;font-weight:950;text-align:center;padding:14px;border:1px solid #cbd5e1;border-radius:18px;margin-bottom:12px;min-height:76px;display:flex;align-items:center;justify-content:center}.padGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.padGrid button,.padLast,.padOk,.padCancel{min-height:62px;border-radius:18px;border:0;font-weight:950}.padGrid button{background:#111827;color:#fff;font-size:28px}.padLast{width:100%;margin-top:10px;background:#e5e7eb;color:#111827;font-size:20px}.padLast.noLast{background:#f8fafc;color:#94a3b8;border:1px dashed #cbd5e1}.padActions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}.padOk{background:#16a34a;color:#fff;font-size:22px}.padCancel{background:#fff;border:1px solid #cbd5e1;color:#111827;font-size:18px}@media(max-width:430px){.days{grid-template-columns:repeat(3,1fr)}.padGrid button,.padLast,.padOk,.padCancel{min-height:58px}.padVal{font-size:36px}}</style></head><body><main><section class="card"><h1>KGG Handyplan</h1><p class="muted">Werte direkt am Handy eintragen. Schmerz 0–10 angeben. Daten bleiben lokal auf diesem Gerät.</p><div id="status" class="status">Plan wird geladen…</div><div id="installSmall" class="row hide"><span class="muted">Plan schneller wiederfinden?</span><button class="btnSmall" onclick="installApp()">Startbildschirm / Hilfe</button></div></section><section id="plan" class="card hide"><h2 id="title"></h2><p id="meta" class="muted"></p><div id="days" class="days"></div><button id="extendBtn" class="btn2 hide" onclick="extendDays()">+ 6 weitere Tage hinzufügen</button><div id="list"></div><button class="btn2" onclick="showQr(false)">Aktuelle Werte als QR zeigen</button><button class="btn" onclick="showQr(true)">Training beenden & QR anzeigen</button></section><section id="end" class="card hide"><h2 id="endTitle"></h2><p id="endInfo" class="muted"></p><div id="qr" class="qr"></div><div id="sum" class="sum"></div><button class="btn2" onclick="$('end').classList.add('hide')">Zurück zum Plan</button></section></main><div id="installBox" class="installBox hide"><h3>Plan zum Startbildschirm hinzufügen?</h3><p class="muted">Dann findest du diesen Trainingsplan später schneller wieder.</p><div class="installBtns"><button class="btn2" onclick="dismissInstall()">Nein danke</button><button class="btn" onclick="installApp()">Hinzufügen / Anleitung</button></div><div id="installHint" class="help hide"></div></div><div id="pad" class="pad hide" onclick="padCancel(event)"><div class="padBox" onclick="event.stopPropagation()"><div id="padTitle" class="padTitle">Wert eingeben</div><div id="padVal" class="padVal">0</div><div class="padGrid"><button onclick="padPress('1')">1</button><button onclick="padPress('2')">2</button><button onclick="padPress('3')">3</button><button onclick="padPress('4')">4</button><button onclick="padPress('5')">5</button><button onclick="padPress('6')">6</button><button onclick="padPress('7')">7</button><button onclick="padPress('8')">8</button><button onclick="padPress('9')">9</button><button onclick="padPress(',')">,</button><button onclick="padPress('0')">0</button><button onclick="padBack()">⌫</button></div><button id="padLast" class="padLast" onclick="padUseLast()">Vorwert übernehmen</button><div class="padActions"><button class="padCancel" onclick="closePad(false)">Abbrechen</button><button class="padOk" onclick="closePad(true)">OK</button></div></div></div><script>let p,d=1,v={},done=[],installPrompt=null,planSource='',activePad=null;const KEY='kggCurrentPlanV1',$=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),enc=s=>btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''),dec=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)))};if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});function standalone(){return matchMedia('(display-mode: standalone)').matches||navigator.standalone}window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installPrompt=e;if(p&&!standalone())$('installSmall').classList.remove('hide')});function dismissInstall(){$('installBox').classList.add('hide');$('installSmall').classList.remove('hide')}async function installApp(){if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;$('installBox').classList.add('hide');return}let h=$('installHint');h.classList.remove('hide');h.innerHTML='<b>Samsung Browser / Chrome:</b><br>oben rechts auf <b>⋮</b> tippen → <b>Seite hinzufügen zu</b> oder <b>Zum Startbildschirm hinzufügen</b> → <b>Startbildschirm</b> wählen.<br><br>Wichtig: Erst muss der Plan sichtbar geladen sein.';$('installSmall').classList.remove('hide')}function maybeAskInstall(){if(standalone()||localStorage.kggInstallAsked)return;$('installBox').classList.remove('hide');localStorage.kggInstallAsked='1'}function parseHash(){let h=location.hash.slice(1);if(!h.startsWith('KGGH2:'))return null;return JSON.parse(dec(h.slice(6)))}function saveCurrent(raw){localStorage.setItem(KEY,JSON.stringify({plan:raw,importedAt:new Date().toISOString()}))}function stored(){try{let s=JSON.parse(localStorage.getItem(KEY)||'null');return s&&s.plan?s.plan:null}catch(e){return null}}function rawPlan(){let r=parseHash();if(r){saveCurrent(r);planSource='hash';return r}r=stored();if(r){planSource='local';return r}throw Error('Kein Plan gefunden. Bitte den QR-Code oder Plan-Link einmal öffnen.')}function exObj(e){if(!Array.isArray(e))e=[];return{n:e[0]||'Übung',sets:Number(e[1])||3,side:e[2]||'LR',u:e[3]||'kg',m:e[4]||'Wdh',sl:e[5]||'',sm:e[6]||'',media:e[7]||'',videoUrl:e[8]||'',videoLabel:e[9]||'Video öffnen'}}function ph(){let raw=JSON.stringify({i:p.id,t:p.title,e:p.ex.map(e=>[e.n,e.sets,e.side,e.u,e.m])}),h=2166136261;for(let i=0;i<raw.length;i++){h^=raw.charCodeAt(i);h=Math.imul(h,16777619)}return(h>>>0).toString(36)}function base(){return'kgg-'+p.id+'-'+ph()}function sk(){return base()+'-values'}function dk(){return base()+'-done'}function mk(){return base()+'-meta'}function read(k,f){try{return JSON.parse(localStorage[k]||f)}catch(e){return JSON.parse(f)}}function save(){if(!p)return;localStorage[sk()]=JSON.stringify(v);localStorage[dk()]=JSON.stringify(done);localStorage[mk()]=JSON.stringify({lastSavedAt:new Date().toISOString(),lastOpenDay:d,lastCompletedDay:done.length?Math.max(...done):0,storageVersion:6})}function safeSave(){try{save()}catch(e){}}document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')safeSave()});window.addEventListener('pagehide',safeSave);window.addEventListener('beforeunload',safeSave);function setStatus(t,k=''){$('status').className='status '+k;$('status').textContent=t}function k(e,s,x,y,day=d){return day+'|'+e+'|'+s+'|'+x+'|'+y}function val(e,s,x,y){return v[k(e,s,x,y)]||''}function put(e,s,x,y,z){v[k(e,s,x,y)]=z;save();setStatus('Automatisch gespeichert.','ok')}function pain(e){return v[k(e,0,'P','pain')]||'0'}function setPain(e,x){v[k(e,0,'P','pain')]=String(x);save();let out=$('painVal'+e);if(out)out.textContent=x+'/10';setStatus('Automatisch gespeichert.','ok')}function next(){return done.length?Math.min(Math.max(...done)+1,p.days):1}function restoreDay(){try{let m=JSON.parse(localStorage[mk()]||'{}'),o=Number(m.lastOpenDay)||0;if(o>=1&&o<=p.days&&!done.includes(o)){d=o;setStatus('Offenes Training T'+d+' wiederhergestellt.','ok');return true}}catch(e){}d=next();return false}function firstFound(list){for(let x of list){if(x!==undefined&&x!==null&&String(x).trim()!=='')return String(x)}return''}function getLastValue(m){let ei=m.ei,s=m.s,side=m.side,key=m.key,other=side==='L'?'R':side==='R'?'L':'B';let same=[];if(s>1)same.push(v[k(ei,s-1,side,key,d)]);if(side!=='B')same.push(v[k(ei,s,other,key,d)]);for(let ps=s-1;ps>=1;ps--){same.push(v[k(ei,ps,side,key,d)]);if(side!=='B')same.push(v[k(ei,ps,other,key,d)])}let x=firstFound(same);if(x)return x;if(d>1){let prev=[];prev.push(v[k(ei,s,side,key,d-1)]);if(side!=='B')prev.push(v[k(ei,s,other,key,d-1)]);for(let ps=s;ps>=1;ps--){prev.push(v[k(ei,ps,side,key,d-1)]);if(side!=='B')prev.push(v[k(ei,ps,other,key,d-1)])}x=firstFound(prev);if(x)return x}return''}function openPad(input,meta){activePad={input,meta};$('pad').classList.remove('hide');$('padVal').textContent=input.value||'0';$('padTitle').textContent=(meta.label||'Wert')+' eingeben';let last=getLastValue(meta),b=$('padLast');b.style.display='block';if(last){b.disabled=false;b.classList.remove('noLast');b.dataset.value=last;b.textContent=last+' übernehmen'}else{b.disabled=true;b.classList.add('noLast');b.dataset.value='';b.textContent='kein Vorwert gefunden'}}function padPress(x){let cur=$('padVal').textContent;if(cur==='0')cur='';if(x===','&&cur.includes(','))return;if(cur.length>7)return;$('padVal').textContent=(cur+x)||'0'}function padBack(){let cur=$('padVal').textContent.slice(0,-1);$('padVal').textContent=cur||'0'}function padUseLast(){let x=$('padLast').dataset.value;if(x)$('padVal').textContent=x}function padCancel(e){if(e&&e.target.id!=='pad')return;closePad(false)}function closePad(ok){if(ok&&activePad){let x=$('padVal').textContent||'0';activePad.input.value=x;let m=activePad.meta;put(m.ei,m.s,m.side,m.key,x)}$('pad').classList.add('hide');activePad=null}function load(){try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});let x=rawPlan();p={id:x.i||'plan',title:x.t||'KGG Trainingsplan',version:Number(x.v)||1,days:Number(x.d)||6,extendDays:x.extendDays!==false,stepDays:Number(x.stepDays)||6,ex:(x.e||[]).map(exObj)};v=read(sk(),'{}');done=read(dk(),'[]').map(Number).filter(n=>n>=1&&n<=p.days);let r=restoreDay();if(!r)setStatus(planSource==='local'?'Plan lokal geladen.':'Plan importiert und lokal gespeichert.','ok');save();render();setTimeout(maybeAskInstall,900)}catch(e){setStatus(e.message,'warn')}}function numInput(ei,s,side,key,ph,label){let value=esc(val(ei,s,side,key));let meta=`{ei:${ei},s:${s},side:'${side}',key:'${key}',label:'${esc(label)}'}`;return `<input class="num" type="text" readonly inputmode="none" autocomplete="off" placeholder="${esc(ph)}" value="${value}" onclick="openPad(this,${meta})">`}function render(){$('plan').classList.remove('hide');$('title').textContent=p.title;$('meta').textContent=p.ex.length+' Übungen · '+p.days+' Trainingstage';$('days').innerHTML=Array.from({length:p.days},(_,i)=>`<button class="${i+1==d?'active ':''}${done.includes(i+1)?'done':''}" onclick="d=${i+1};save();render()">T${i+1}</button>`).join('');$('extendBtn').classList.toggle('hide',!p.extendDays);$('extendBtn').textContent='+ '+p.stepDays+' weitere Tage hinzufügen';$('list').innerHTML=p.ex.map((e,ei)=>{let rows='';for(let s=1;s<=e.sets;s++){let a=d==1&&e.sl?e.sl:e.u,b=d==1&&e.sm?e.sm:e.m;rows+=e.side==='LR'?`<div class="set"><b>Satz ${s}</b><div class="lr"><span>Li</span>${numInput(ei,s,'L','a',a,a)}${numInput(ei,s,'L','b',b,b)}</div><div class="lr"><span>Re</span>${numInput(ei,s,'R','a',a,a)}${numInput(ei,s,'R','b',b,b)}</div></div>`:`<div class="set"><b>Satz ${s}</b><div class="bi">${numInput(ei,s,'B','a',a,a)}${numInput(ei,s,'B','b',b,b)}</div></div>`}let start=d==1&&(e.sl||e.sm)?`<div class="muted">T1-Vorschlag: ${esc(e.sl||'?')} ${esc(e.u)} · ${esc(e.sm||'?')} ${esc(e.m)}</div>`:'';return`<div class="ex"><h3>${esc(e.n)}</h3><div class="muted">${e.sets} Sätze · ${e.side==='LR'?'links/rechts':'beidseitig'} · ${esc(e.u)} · ${esc(e.m)}</div>${start}${rows}<div class="pain"><b>Schmerz 0–10</b><div class="painRow"><input type="range" min="0" max="10" step="1" value="${pain(ei)}" oninput="setPain(${ei},this.value)"><span class="painVal" id="painVal${ei}">${pain(ei)}/10</span></div></div></div>`}).join('')}function extendDays(){p.days+=p.stepDays||6;save();render();setStatus('Weitere Trainingstage hinzugefügt: bis T'+p.days+'.','ok')}function rows(day){return p.ex.map((e,ei)=>{let r=[];for(let s=1;s<=e.sets;s++)r.push(e.side==='LR'?[v[k(ei,s,'L','a',day)]||'',v[k(ei,s,'L','b',day)]||'',v[k(ei,s,'R','a',day)]||'',v[k(ei,s,'R','b',day)]||'']:[v[k(ei,s,'B','a',day)]||'',v[k(ei,s,'B','b',day)]||'']);return[e.n,e.sets,e.side,e.u,e.m,r,v[k(ei,0,'P','pain',day)]||'0']})}function text(day){let o=[];rows(day).forEach(e=>{let[n,sets,side,u,m,r,pn]=e,l=[];r.forEach((x,i)=>{if(side==='LR'){if(x.some(Boolean))l.push(`${i+1}. Satz: ${x[0]||'?'} ${u} @ ${x[1]||'?'} ${m} li    ${x[2]||'?'} ${u} @ ${x[3]||'?'} ${m} re`)}else if(x.some(Boolean))l.push(`${i+1}. Satz: ${x[0]||'?'} ${u} @ ${x[1]||'?'} ${m}`)});if(l.length||Number(pn)>0)o.push(`${n} — Tag ${day}`,...l,Number(pn)>0?`Schmerz: ${pn}/10`:'','')});return o.join('\n').trim()}function makeQr(data){if(typeof qrcode!=='function')return`<p class="muted">QR-Bibliothek nicht geladen.</p><div class="sum">${esc(data)}</div>`;let q=qrcode(0,'M');q.addData(data);q.make();return q.createImgTag(6,4)}function copyQrPayload(){let x=$('qr').dataset.payload||'';if(!x)return;let ok=()=>setStatus('QR-Code kopiert.','ok'),fail=()=>{try{let t=document.createElement('textarea');t.value=x;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.focus();t.select();let done=document.execCommand&&document.execCommand('copy');t.remove();done?ok():setStatus('Kopieren nicht erlaubt. QR-Code gedrueckt halten oder Screenshot nutzen.','warn')}catch(e){setStatus('Kopieren nicht erlaubt. QR-Code gedrueckt halten oder Screenshot nutzen.','warn')}};if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(x).then(ok).catch(fail);else fail()}function showQr(finalize){if(finalize){if(!done.includes(d))done.push(d);done.sort((a,b)=>a-b)}save();let payload='KGGD1:'+enc(JSON.stringify({v:1,i:p.id,d,e:rows(d),final:!!finalize}));$('qr').dataset.payload=payload;$('qr').innerHTML=makeQr(payload)+'<button class="btn2" onclick="copyQrPayload()">QR-Code kopieren</button>'; $('sum').textContent=text(d)||'Keine Werte eingetragen.';$('endTitle').textContent=finalize?`Training T${d} beendet`:`Aktuelle Werte T${d}`;$('endInfo').textContent=finalize?'Training wurde als abgeschlossen markiert. Zeige diesen QR dem Therapeuten.':'Zwischenstand: Dieser QR beendet das Training nicht. Danach kannst du weiter eintragen.';$('end').classList.remove('hide');$('end').scrollIntoView({behavior:'smooth'});render()}load();</script><script src="./patient-media-retry-cache_v2.js?v=media-inline-bundle-7"></script></body></html>
